name: Set Worker Secrets

# ── Crontech API — One-Shot Wrangler Secret Setter ──────────────────
# BLK-020 Phase B: the production api worker (apps/api, deploys via
# deploy.yml -> cloudflare/wrangler) needs ~12 runtime secrets set
# before Phase B of the Launch Checklist can tick green. Rather than
# making Craig paste each one into `wrangler secret put` by hand,
# this workflow lets him:
#
#   1. Set each secret ONCE in GitHub repo/environment secrets.
#   2. Trigger this workflow manually (workflow_dispatch).
#   3. The workflow pipes each secret to the production worker via
#      `echo "$SECRET" | bunx wrangler secret put NAME --env production`.
#
# Why stdin (not CLI args)? `wrangler secret put NAME` reads the value
# from stdin when stdin is not a TTY, which means the secret value
# never appears in `ps`, the shell history, or the workflow logs.
# Passing it on the command line would leak it into process listings.
#
# Why no workflow_dispatch inputs? Inputs are visible in the Actions
# UI run metadata. Secrets are not. Keeping all values in
# `secrets.*` means Craig pastes each one exactly once (into the
# GitHub secrets UI) and this workflow can be re-run any number of
# times without ever re-entering them.
#
# Why `if: env.FOO != ''` guards? Craig may not have all 12 secrets
# ready on the first run. Each step short-circuits when the source
# secret is empty, so a partial run just sets what's available and
# skips the rest — instead of failing the whole workflow and forcing
# a re-run once the missing secrets land.
#
# Required GitHub repo secrets (each mapped to a worker secret of the
# same name):
#   DATABASE_URL              — libsql://<db>.turso.io
#   DATABASE_AUTH_TOKEN       — Turso auth token
#   SESSION_SECRET            — openssl rand -base64 48
#   JWT_SECRET                — openssl rand -base64 48
#   GOOGLE_CLIENT_ID          — Google OAuth client ID
#   GOOGLE_CLIENT_SECRET      — Google OAuth client secret
#   STRIPE_SECRET_KEY         — Stripe secret key (sk_live_...)
#   STRIPE_WEBHOOK_SECRET     — Stripe webhook signing secret (whsec_...)
#   STRIPE_PRO_PRICE_ID       — Stripe price_... for Pro plan
#   STRIPE_ENTERPRISE_PRICE_ID — Stripe price_... for Enterprise plan
#   OPENAI_API_KEY            — OpenAI API key
#   ANTHROPIC_API_KEY         — Anthropic API key
#
# Plus the existing deploy credentials (already configured for
# deploy.yml):
#   CLOUDFLARE_API_TOKEN
#   CLOUDFLARE_ACCOUNT_ID

on:
  workflow_dispatch:

# Workflow-wide baseline: read-only. Wrangler uploads secrets to
# Cloudflare via CLOUDFLARE_API_TOKEN (not GITHUB_TOKEN), so no job
# needs write scope on the repo itself. Least-privilege by default.
permissions:
  contents: read

concurrency:
  # One secret-setter at a time. Concurrent wrangler secret puts
  # against the same worker can race and leave the worker in an
  # inconsistent state (wrangler re-uploads the full bundle on each
  # `secret put` to pick up the new value).
  group: set-worker-secrets
  cancel-in-progress: false

jobs:
  set-secrets:
    name: Set Worker Secrets → crontech-api (production)
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # --- Database ---------------------------------------------------
      - name: Set DATABASE_URL
        if: ${{ env.VALUE != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.DATABASE_URL }}
        run: printf '%s' "$VALUE" | bunx wrangler secret put DATABASE_URL --env production

      - name: Set DATABASE_AUTH_TOKEN
        if: ${{ env.VALUE != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.DATABASE_AUTH_TOKEN }}
        run: printf '%s' "$VALUE" | bunx wrangler secret put DATABASE_AUTH_TOKEN --env production

      # --- Auth -------------------------------------------------------
      - name: Set SESSION_SECRET
        if: ${{ env.VALUE != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.SESSION_SECRET }}
        run: printf '%s' "$VALUE" | bunx wrangler secret put SESSION_SECRET --env production

      - name: Set JWT_SECRET
        if: ${{ env.VALUE != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.JWT_SECRET }}
        run: printf '%s' "$VALUE" | bunx wrangler secret put JWT_SECRET --env production

      - name: Set GOOGLE_CLIENT_ID
        if: ${{ env.VALUE != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: printf '%s' "$VALUE" | bunx wrangler secret put GOOGLE_CLIENT_ID --env production

      - name: Set GOOGLE_CLIENT_SECRET
        if: ${{ env.VALUE != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: printf '%s' "$VALUE" | bunx wrangler secret put GOOGLE_CLIENT_SECRET --env production

      # --- Stripe -----------------------------------------------------
      - name: Set STRIPE_SECRET_KEY
        if: ${{ env.VALUE != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.STRIPE_SECRET_KEY }}
        run: printf '%s' "$VALUE" | bunx wrangler secret put STRIPE_SECRET_KEY --env production

      - name: Set STRIPE_WEBHOOK_SECRET
        if: ${{ env.VALUE != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: printf '%s' "$VALUE" | bunx wrangler secret put STRIPE_WEBHOOK_SECRET --env production

      - name: Set STRIPE_PRO_PRICE_ID
        if: ${{ env.VALUE != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.STRIPE_PRO_PRICE_ID }}
        run: printf '%s' "$VALUE" | bunx wrangler secret put STRIPE_PRO_PRICE_ID --env production

      - name: Set STRIPE_ENTERPRISE_PRICE_ID
        if: ${{ env.VALUE != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.STRIPE_ENTERPRISE_PRICE_ID }}
        run: printf '%s' "$VALUE" | bunx wrangler secret put STRIPE_ENTERPRISE_PRICE_ID --env production

      # --- AI providers -----------------------------------------------
      - name: Set OPENAI_API_KEY
        if: ${{ env.VALUE != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.OPENAI_API_KEY }}
        run: printf '%s' "$VALUE" | bunx wrangler secret put OPENAI_API_KEY --env production

      - name: Set ANTHROPIC_API_KEY
        if: ${{ env.VALUE != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.ANTHROPIC_API_KEY }}
        run: printf '%s' "$VALUE" | bunx wrangler secret put ANTHROPIC_API_KEY --env production

      # --- Final audit ------------------------------------------------
      # List every secret bound to the worker so the workflow output
      # shows what landed. `wrangler secret list` prints names only —
      # it does NOT print values — so this is safe.
      - name: List all secrets on crontech-api
        if: always()
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler secret list --env production
