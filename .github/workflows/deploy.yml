name: Deploy

# ── Crontech Production Deploy (Vultr) ───────────────────────────────────
# Strategy: build ONCE in CI, ship pre-built artifacts to the server.
# Server side: git pull + extract tarball + migrate + restart — ~30 seconds.
# No second build on the server. No waiting.
#
# Required GitHub secrets:
#   VULTR_SERVER_IP    — production server IPv4
#   VULTR_SSH_KEY      — private SSH key for root deploy user

on:
  push:
    branches: [Main]
  workflow_dispatch:

concurrency:
  group: deploy-Main
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build & Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate migrations
        run: bun run db:validate

      - name: Type check
        run: bun run check

      - name: Biome lint
        run: bunx biome check apps packages services

      - name: Link checker
        run: bun run check-links

      - name: Button checker
        run: bun run check-buttons

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test

      # Package every build output into a single tarball.
      # The server extracts this instead of running bun build — cuts
      # server-side deploy time from ~5 min to ~30 sec.
      - name: Package build artifacts
        run: |
          tar -czf crontech-dist.tar.gz \
            apps/api/dist/ \
            apps/web/.output/ \
            packages/db/dist/ \
            packages/ui/dist/ \
            packages/ai-core/dist/ \
            packages/audit-log/dist/ \
            packages/queue/dist/ \
            packages/schemas/dist/ \
            packages/storage/dist/ \
            packages/theatre/dist/ \
            packages/flywheel/dist/ \
            services/edge-workers/dist/ \
            2>/dev/null || true
          echo "Artifact: $(du -sh crontech-dist.tar.gz | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: crontech-dist.tar.gz
          retention-days: 7
          if-no-files-found: error

  deploy-vultr:
    name: Deploy to Vultr
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: .

      - name: Ship artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VULTR_SERVER_IP }}
          username: root
          key: ${{ secrets.VULTR_SSH_KEY }}
          source: "crontech-dist.tar.gz"
          target: "/tmp/"

      - name: Deploy via SSH (artifact swap — no rebuild on server)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VULTR_SERVER_IP }}
          username: root
          key: ${{ secrets.VULTR_SSH_KEY }}
          command_timeout: 8m
          script: |
            set -euo pipefail
            export PATH="$HOME/.bun/bin:/usr/local/bin:$PATH"
            echo "=== Crontech Deploy — artifact swap ==="

            APP_DIR="/opt/crontech"
            cd "$APP_DIR"

            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "none")
            echo "Previous SHA: $PREV_SHA"

            # [1] Pull latest code (config, migrations, service files — no rebuild)
            echo "[1/6] Pulling latest code..."
            git fetch origin Main
            git reset --hard origin/Main

            # [2] Sync deps (fast — frozen lockfile, existing node_modules)
            echo "[2/6] Syncing dependencies..."
            bun install --frozen-lockfile

            # [3] Extract pre-built artifacts (replaces bun run build entirely)
            echo "[3/6] Extracting pre-built artifacts..."
            tar -xzf /tmp/crontech-dist.tar.gz -C "$APP_DIR"
            rm -f /tmp/crontech-dist.tar.gz
            echo "  Done — build outputs in place"

            # [4] Validate and repair .env
            # systemd silently ignores any line whose variable name doesn't
            # match its env-var grammar. A single corrupt byte (smart quote,
            # Unicode look-alike like U+2248 "almost equal", BOM, stray '=')
            # at the start of a line takes that variable down without warning.
            # On 2026-04-26 a leading "≈" on PUBLIC_URL silently broke the
            # web service for ~36 hours. Strip every plausible offender
            # before checking for survivors.
            echo "[4/6] Validating env file..."
            if [ -f /opt/crontech/.env ]; then
              # Strip a UTF-8 BOM if some editor stamped one onto the file head.
              sed -i '1s/^\xEF\xBB\xBF//' /opt/crontech/.env
              # Strip any sequence of leading bytes that aren't a valid env-var
              # name char, '#', '=', or whitespace, before a VAR_NAME= pattern.
              # Catches U+2248, smart quotes, stray '=', and similar paste rot.
              sed -i -E 's/^[^A-Za-z_#=[:space:]]+([A-Z_][A-Z0-9_]*=)/\1/' /opt/crontech/.env
              # Surface anything still malformed so it shows up in the deploy log
              # instead of being silently ignored by systemd.
              MALFORMED=$(grep -n '^[^A-Za-z#[:space:]]' /opt/crontech/.env || true)
              if [ -n "$MALFORMED" ]; then
                echo "WARNING: Malformed .env lines remain after auto-repair:"
                echo "$MALFORMED"
              else
                echo "  .env clean"
              fi
            fi

            # [5] Run database migrations + sync service files + restart
            echo "[5/6] Migrating + restarting..."
            bun run --cwd apps/api -e 'import("@back-to-the-future/db/migrate").then(m => m.runMigrations()).then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1) })' \
              || echo "Migration skipped (DB not configured)"

            # Fix Caddy log ownership
            mkdir -p /var/log/caddy
            chown -R caddy:caddy /var/log/caddy

            # Sync service unit files from repo
            cp infra/bare-metal/crontech-web.service /etc/systemd/system/crontech-web.service
            cp infra/bare-metal/crontech-api.service /etc/systemd/system/crontech-api.service
            cp infra/bare-metal/crontech-deploy-agent.service /etc/systemd/system/crontech-deploy-agent.service
            cp infra/bare-metal/crontech-watchdog.service /etc/systemd/system/crontech-watchdog.service
            cp infra/bare-metal/crontech-watchdog.timer /etc/systemd/system/crontech-watchdog.timer
            mkdir -p /opt/crontech/scripts
            cp infra/bare-metal/crontech-watchdog.sh /opt/crontech/scripts/watchdog.sh
            chmod +x /opt/crontech/scripts/watchdog.sh
            systemctl daemon-reload
            systemctl enable --now crontech-deploy-agent 2>/dev/null || true
            systemctl enable --now crontech-watchdog.timer 2>/dev/null || true

            systemctl restart crontech-api
            sleep 2
            systemctl restart crontech-web

            # [6] Health checks with automatic rollback
            echo "[6/6] Verifying..."
            DEPLOY_OK=false
            for i in $(seq 1 12); do
              sleep 5
              # Hono mounts the api under basePath("/api"), so the live health
              # route is /api/health, not /health. Curling /health returns 404
              # and rolls back every deploy silently — discovered 2026-04-26.
              API=$(curl -sf http://localhost:3001/api/health 2>/dev/null | grep -o '"status":"ok"' || echo "fail")
              WEB=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
              echo "  Check $i/12: api=$API web=$WEB"
              if [ "$API" = '"status":"ok"' ] && [ "$WEB" = "200" ]; then
                DEPLOY_OK=true
                break
              fi
            done

            if [ "$DEPLOY_OK" = true ]; then
              echo ""
              echo "=== DEPLOY SUCCESS ==="
              echo "  Web: https://crontech.ai"
              echo "  API: https://api.crontech.ai"
              echo "  SHA: $(git rev-parse --short HEAD)"
            else
              echo ""
              echo "=== DEPLOY FAILED — ROLLING BACK ==="
              if [ "$PREV_SHA" != "none" ]; then
                git reset --hard "$PREV_SHA"
                bun install --frozen-lockfile
                bun run build
                systemctl restart crontech-api
                sleep 2
                systemctl restart crontech-web
                echo "Rolled back to $PREV_SHA"
              fi
              echo ""
              echo "--- crontech-api logs ---"
              journalctl -u crontech-api --no-pager -n 30
              echo ""
              echo "--- crontech-web logs ---"
              journalctl -u crontech-web --no-pager -n 30
              exit 1
            fi
