name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip type-check + test gates (use for first preview deploy)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome lint (non-blocking on first preview deploy)
        run: bunx biome check .
        continue-on-error: true

      - name: Type check (non-blocking on first preview deploy)
        run: bun run check
        continue-on-error: true

      - name: Link checker (zero-broken-anything enforcement)
        run: bun run check-links

      - name: Button checker (zero-broken-anything enforcement)
        run: bun run check-buttons

      - name: Build all packages
        run: bun run build

      - name: Run tests (non-blocking on first preview deploy)
        run: bun run test
        continue-on-error: true

      - name: Upload web build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.output/
          retention-days: 1

      - name: Upload edge-workers source
        uses: actions/upload-artifact@v4
        with:
          name: edge-workers
          path: |
            services/edge-workers/
            infra/cloudflare/wrangler.toml
          retention-days: 1

  deploy-api-dry-run:
    name: Deploy API (Dry Run)
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download edge-workers artifact
        uses: actions/download-artifact@v8
        with:
          name: edge-workers
          path: .

      - name: Dry-run deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: services/edge-workers
          command: deploy --dry-run

  deploy-api:
    name: Deploy API to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: deploy-api-dry-run
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download edge-workers artifact
        uses: actions/download-artifact@v8
        with:
          name: edge-workers
          path: .

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: services/edge-workers
          command: deploy

  deploy-web:
    name: Deploy Web to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build
        working-directory: apps/web

      - name: Verify build output exists
        run: |
          if [ ! -d "apps/web/.output/public" ]; then
            echo "::error::Build output directory apps/web/.output/public does not exist"
            ls -la apps/web/.output/ || true
            exit 1
          fi
          echo "Build output verified."
          du -sh apps/web/.output/public

      - name: Ensure Cloudflare Pages project exists (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Try to create the Pages project. If it already exists (HTTP 4xx), ignore.
          npx -y wrangler@latest pages project create crontech-web --production-branch=main || \
            echo "Project may already exist — proceeding with deploy."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/.output/public --project-name=crontech-web --branch=main --commit-dirty=true

  post-deploy-smoke:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    if: ${{ vars.API_URL != '' && vars.WEB_URL != '' }}
    steps:
      - name: Health check API
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.API_URL }}/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API health check passed"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying..."
            sleep 5
          done
          echo "API health check failed after 5 attempts"
          exit 1

      - name: Health check Web
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.WEB_URL }}" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Web health check passed"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying..."
            sleep 5
          done
          echo "Web health check failed after 5 attempts"
          exit 1
