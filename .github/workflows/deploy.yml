name: Deploy

# ── Crontech Production Deploy (Vultr) ───────────────────────────────────
# Strategy: build ONCE in CI, ship pre-built artifacts to the server.
# Server side: git pull + extract tarball + migrate + restart — ~30 seconds.
# No second build on the server. No waiting.
#
# Required GitHub secrets:
#   VULTR_SERVER_IP        — production server IPv4
#   VULTR_SSH_KEY          — private SSH key for root deploy user
#   SLACK_DEPLOY_WEBHOOK   — Slack incoming webhook URL for deploy failure
#                            alerts (posted from the public smoke-test step)

on:
  push:
    branches: [Main]
  workflow_dispatch:

concurrency:
  group: deploy-Main
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build & Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate migrations
        run: bun run db:validate

      - name: Type check
        run: bun run check

      - name: Biome lint
        run: bunx biome check apps packages services

      - name: Link checker
        run: bun run check-links

      - name: Button checker
        run: bun run check-buttons

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test

      # Package every build output into a single tarball.
      # The server extracts this instead of running bun build — cuts
      # server-side deploy time from ~5 min to ~30 sec.
      - name: Package build artifacts
        run: |
          tar -czf crontech-dist.tar.gz \
            apps/api/dist/ \
            apps/web/.output/ \
            packages/db/dist/ \
            packages/ui/dist/ \
            packages/ai-core/dist/ \
            packages/audit-log/dist/ \
            packages/queue/dist/ \
            packages/schemas/dist/ \
            packages/storage/dist/ \
            packages/theatre/dist/ \
            packages/flywheel/dist/ \
            services/edge-workers/dist/ \
            2>/dev/null || true
          echo "Artifact: $(du -sh crontech-dist.tar.gz | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: crontech-dist.tar.gz
          retention-days: 7
          if-no-files-found: error

  deploy-vultr:
    name: Deploy to Vultr
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: .

      - name: Ship artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VULTR_SERVER_IP }}
          username: root
          key: ${{ secrets.VULTR_SSH_KEY }}
          source: "crontech-dist.tar.gz"
          target: "/tmp/"

      - name: Deploy via SSH (artifact swap — no rebuild on server)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VULTR_SERVER_IP }}
          username: root
          key: ${{ secrets.VULTR_SSH_KEY }}
          command_timeout: 8m
          script: |
            set -euo pipefail
            export PATH="$HOME/.bun/bin:/usr/local/bin:$PATH"
            echo "=== Crontech Deploy — artifact swap ==="

            APP_DIR="/opt/crontech"
            cd "$APP_DIR"

            # [0] Ensure /usr/local/bin/bun exists for system-wide use.
            # The systemd unit files for User=deploy services
            # (crontech-api, crontech-web, crontech-tunnel-origin) and
            # the dns-server unit (User=dns-server) all use
            # `ExecStart=/usr/local/bin/bun ...`. Bun is normally
            # installed at /root/.bun/bin/bun by the official installer
            # and that path is unreadable to non-root users — so a fresh
            # box (or a box where the system-wide install was wiped)
            # leaves crontech-web (and friends) failing with
            # systemd's status=203/EXEC ("cannot execute binary").
            #
            # On 2026-04-26 this caused crontech-web.service to spin in
            # a 5-second restart loop for ~47 hours (visible as restart
            # counter 34000+ in journalctl). The deploy gate caught it
            # via the smoke test, but no auto-fix existed.
            #
            # This step is idempotent and ALWAYS overwrites: copies
            # /root/.bun/bin/bun to /usr/local/bin/bun (chmod 755) every
            # deploy. Earlier versions used a `-nt` "newer than" check to
            # skip the copy when /usr/local/bin/bun was "already current",
            # but that hid the case where the existing binary was broken
            # / corrupted / a wrong arch — which on 2026-04-28 caused the
            # exact 203/EXEC failure mode this step was supposed to
            # prevent. The `cp` is ~100ms, so unconditional is cheaper
            # than the diagnosis cycle of a hidden-stale binary.
            #
            # Both deploy-agent (User=root, uses /root/.bun/bin/bun) AND
            # web/api (User=deploy, uses /usr/local/bin/bun) keep working.
            echo "[0/6] Ensuring /usr/local/bin/bun is present..."
            if [ -x /root/.bun/bin/bun ]; then
              cp -f /root/.bun/bin/bun /usr/local/bin/bun
              chmod 755 /usr/local/bin/bun
            else
              echo "  WARNING: /root/.bun/bin/bun missing — installing fresh"
              curl -fsSL https://bun.sh/install | bash
              cp -f /root/.bun/bin/bun /usr/local/bin/bun
              chmod 755 /usr/local/bin/bun
            fi

            # Smoke-test the binary actually runs. If /usr/local/bin/bun
            # is corrupt / wrong arch / non-executable, exit the deploy
            # NOW with a loud error instead of restarting services that
            # immediately hit 203/EXEC and waste 60 seconds in the [6/6]
            # health-check loop.
            if ! /usr/local/bin/bun --version >/dev/null 2>&1; then
              echo "  ERROR: /usr/local/bin/bun is not executable / not a valid binary"
              ls -la /usr/local/bin/bun /root/.bun/bin/bun || true
              exit 1
            fi
            echo "  /usr/local/bin/bun → $(/usr/local/bin/bun --version)"

            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "none")
            echo "Previous SHA: $PREV_SHA"

            # [1] Pull latest code (config, migrations, service files — no rebuild)
            echo "[1/6] Pulling latest code..."
            git fetch origin Main
            git reset --hard origin/Main

            # [2] Sync deps (fast — frozen lockfile, existing node_modules)
            #
            # Workspace-symlink refresh: on 2026-04-28 the api crashed at
            # boot because services/object-storage/package.json gained a
            # new `./client` export (no dep change, only an export-map
            # change). `bun install --frozen-lockfile` saw "no lockfile
            # delta" and skipped re-linking node_modules/@back-to-the-future/*,
            # so apps/api couldn't resolve `@back-to-the-future/object-storage/client`
            # and crashed with `Cannot find module ...`.
            #
            # Fix: always remove the workspace symlink directory before
            # install. bun re-creates the symlinks in milliseconds during
            # the install pass — no actual download cost.
            echo "[2/6] Syncing dependencies..."
            rm -rf node_modules/@back-to-the-future || true
            bun install --frozen-lockfile

            # [3] Extract pre-built artifacts (replaces bun run build entirely)
            echo "[3/6] Extracting pre-built artifacts..."
            tar -xzf /tmp/crontech-dist.tar.gz -C "$APP_DIR"
            rm -f /tmp/crontech-dist.tar.gz
            echo "  Done — build outputs in place"

            # [4] Validate and repair .env
            # systemd silently ignores any line whose variable name doesn't
            # match its env-var grammar. A single corrupt byte (smart quote,
            # Unicode look-alike like U+2248 "almost equal", BOM, stray '=')
            # at the start of a line takes that variable down without warning.
            # On 2026-04-26 a leading "≈" on PUBLIC_URL silently broke the
            # web service for ~36 hours. Strip every plausible offender
            # before checking for survivors.
            echo "[4/6] Validating env file..."
            if [ -f /opt/crontech/.env ]; then
              # Strip a UTF-8 BOM if some editor stamped one onto the file head.
              sed -i '1s/^\xEF\xBB\xBF//' /opt/crontech/.env
              # Strip any sequence of leading bytes that aren't a valid env-var
              # name char, '#', '=', or whitespace, before a VAR_NAME= pattern.
              # Catches U+2248, smart quotes, stray '=', and similar paste rot.
              sed -i -E 's/^[^A-Za-z_#=[:space:]]+([A-Z_][A-Z0-9_]*=)/\1/' /opt/crontech/.env
              # Surface anything still malformed so it shows up in the deploy log
              # instead of being silently ignored by systemd.
              MALFORMED=$(grep -n '^[^A-Za-z#[:space:]]' /opt/crontech/.env || true)
              if [ -n "$MALFORMED" ]; then
                echo "WARNING: Malformed .env lines remain after auto-repair:"
                echo "$MALFORMED"
              else
                echo "  .env clean"
              fi
            fi

            # [5] Run database migrations + sync service files + restart
            echo "[5/6] Migrating + restarting..."
            bun run --cwd apps/api -e 'import("@back-to-the-future/db/migrate").then(m => m.runMigrations()).then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1) })' \
              || echo "Migration skipped (DB not configured)"

            # Fix Caddy log ownership
            mkdir -p /var/log/caddy
            chown -R caddy:caddy /var/log/caddy

            # Sync service unit files from repo
            cp infra/bare-metal/crontech-web.service /etc/systemd/system/crontech-web.service
            cp infra/bare-metal/crontech-api.service /etc/systemd/system/crontech-api.service
            cp infra/bare-metal/crontech-deploy-agent.service /etc/systemd/system/crontech-deploy-agent.service
            cp infra/bare-metal/crontech-watchdog.service /etc/systemd/system/crontech-watchdog.service
            cp infra/bare-metal/crontech-watchdog.timer /etc/systemd/system/crontech-watchdog.timer
            cp infra/bare-metal/dns-server.service /etc/systemd/system/dns-server.service
            cp infra/bare-metal/crontech-sentinel.service /etc/systemd/system/crontech-sentinel.service
            cp infra/bare-metal/crontech-edge-runtime.service /etc/systemd/system/crontech-edge-runtime.service
            cp infra/bare-metal/crontech-ai-gateway.service /etc/systemd/system/crontech-ai-gateway.service
            cp infra/bare-metal/crontech-object-storage.service /etc/systemd/system/crontech-object-storage.service
            cp infra/bare-metal/crontech-tunnel-origin.service /etc/systemd/system/crontech-tunnel-origin.service
            mkdir -p /opt/crontech/scripts
            cp infra/bare-metal/crontech-watchdog.sh /opt/crontech/scripts/watchdog.sh
            chmod +x /opt/crontech/scripts/watchdog.sh
            systemctl daemon-reload
            # Always-on services (graceful failure with `|| true` — a missing
            # secret / docker / user shouldn't break the whole deploy).
            systemctl enable --now crontech-deploy-agent 2>/dev/null || true
            systemctl enable --now crontech-watchdog.timer 2>/dev/null || true
            systemctl enable --now dns-server 2>/dev/null || true
            systemctl enable --now crontech-sentinel 2>/dev/null || true
            systemctl enable --now crontech-edge-runtime 2>/dev/null || true
            systemctl enable --now crontech-ai-gateway 2>/dev/null || true
            systemctl enable --now crontech-object-storage 2>/dev/null || true
            systemctl enable --now crontech-tunnel-origin 2>/dev/null || true

            # Clear any restart-limit lockout from the prior 203/EXEC
            # crash loops. Without this, systemd refuses to restart a
            # unit that hit StartLimitBurst (default 5 failures in 10s)
            # — the exact state crontech-web.service was in for ~47h
            # before the 2026-04-26 fix. reset-failed is a no-op on
            # healthy units, so it's safe to run unconditionally.
            systemctl reset-failed crontech-api 2>/dev/null || true
            systemctl reset-failed crontech-web 2>/dev/null || true

            systemctl restart crontech-api
            sleep 2
            systemctl restart crontech-web

            # [6] Health checks with automatic rollback
            echo "[6/6] Verifying..."
            DEPLOY_OK=false
            for i in $(seq 1 12); do
              sleep 5
              # Hono mounts the api under basePath("/api"), so the live health
              # route is /api/health, not /health. Curling /health returns 404
              # and rolls back every deploy silently — discovered 2026-04-26.
              #
              # Pass `Host: api.crontech.ai` so this loopback check exercises
              # the SAME middleware chain external traffic does (subdomainRouter,
              # CSRF origin checks, etc.). Without the Host header, the
              # subdomainRouter took the IP-address bypass and /api/health
              # returned 200 internally even when api.crontech.ai/api/health
              # was 500'ing externally — the 2026-04-26 ~24h outage. PR #211
              # fixed the subdomainRouter; this Host header makes the deploy
              # gate catch the same class of bug if it ever recurs.
              API=$(curl -sf -H "Host: api.crontech.ai" http://localhost:3001/api/health 2>/dev/null | grep -o '"status":"ok"' || echo "fail")
              WEB=$(curl -s -H "Host: crontech.ai" -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
              echo "  Check $i/12: api=$API web=$WEB"
              if [ "$API" = '"status":"ok"' ] && [ "$WEB" = "200" ]; then
                DEPLOY_OK=true
                break
              fi
            done

            if [ "$DEPLOY_OK" = true ]; then
              echo ""
              echo "=== DEPLOY SUCCESS ==="
              echo "  Web: https://crontech.ai"
              echo "  API: https://api.crontech.ai"
              echo "  SHA: $(git rev-parse --short HEAD)"
            else
              echo ""
              echo "=== DEPLOY FAILED — ROLLING BACK ==="
              if [ "$PREV_SHA" != "none" ]; then
                git reset --hard "$PREV_SHA"
                bun install --frozen-lockfile
                bun run build
                systemctl restart crontech-api
                sleep 2
                systemctl restart crontech-web
                echo "Rolled back to $PREV_SHA"
              fi
              echo ""
              echo "--- crontech-api logs ---"
              journalctl -u crontech-api --no-pager -n 30
              echo ""
              echo "--- crontech-web logs ---"
              journalctl -u crontech-web --no-pager -n 30
              exit 1
            fi

      # ── Public smoke test ─────────────────────────────────────────────────
      # The inner SSH health-check above curls localhost on the server. That
      # is necessary but not sufficient — it tells us the processes are up,
      # not that the public hostnames resolve, that Caddy is fronting them
      # correctly, that TLS is valid, or that Cloudflare DNS is pointing at
      # the right origin.
      #
      # On 2026-04-26 the platform sat broken for ~36 hours because the
      # inner health-check was curling the wrong path (/health instead of
      # /api/health). That class of bug is invisible from inside the box
      # but obvious from the public internet. This step is the OUTER check.
      # If the public URLs are not 2xx, the deploy is not real.
      - name: Public smoke test
        run: |
          set -e
          fail() {
            echo "::error::Public smoke test failed for $1"
            echo "SMOKE_FAILED_URL=$1" >> "$GITHUB_ENV"
            exit 1
          }
          smoke() {
            local url="$1"
            local attempt=1
            local max=3
            while [ $attempt -le $max ]; do
              echo "Attempt $attempt/$max — GET $url"
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$url" || echo "000")
              if [ "$code" -ge 200 ] 2>/dev/null && [ "$code" -lt 300 ] 2>/dev/null; then
                echo "  OK ($code)"
                return 0
              fi
              echo "  Got HTTP $code — backing off 5s"
              attempt=$((attempt + 1))
              sleep 5
            done
            fail "$url"
          }
          smoke "https://crontech.ai/"
          smoke "https://api.crontech.ai/api/health"
          echo "Public smoke test passed for both URLs."

      - name: Notify on failure
        if: failure()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "${SLACK_WEBHOOK:-}" ]; then
            echo "SLACK_DEPLOY_WEBHOOK not set — skipping Slack alert"
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          FAILED_URL="${SMOKE_FAILED_URL:-unknown (see job log)}"
          TEXT=":rotating_light: Crontech deploy failed — public smoke test could not verify the production URLs.\n*Failed step / URL:* ${FAILED_URL}\n*SHA:* \`${SHA}\`\n*Run:* ${RUN_URL}"
          PAYLOAD=$(jq -n --arg text "$TEXT" '{text: $text}')
          curl -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK" \
            || echo "Slack POST failed (non-fatal)"
