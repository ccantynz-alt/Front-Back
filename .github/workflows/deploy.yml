name: Deploy

# ── Crontech Production Deploy (Vultr) ───────────────────────────────────
# Pushes to Main: build + test locally, then SSH into the Vultr box
# and pull/rebuild/restart. No Docker — runs Bun directly via systemd.
# Caddy handles TLS + reverse proxy.
#
# Required GitHub secrets:
#   VULTR_SERVER_IP    — production server IPv4
#   VULTR_SSH_KEY      — private SSH key for root deploy user

on:
  push:
    branches: [Main]
  workflow_dispatch:

concurrency:
  group: deploy-Main
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build & Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate migrations
        run: bun run db:validate

      - name: Type check
        run: bun run check

      - name: Biome lint
        run: bunx biome check apps packages services

      - name: Link checker
        run: bun run check-links

      - name: Button checker
        run: bun run check-buttons

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test

  deploy-vultr:
    name: Deploy to Vultr
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VULTR_SERVER_IP }}
          username: root
          key: ${{ secrets.VULTR_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            export PATH="$HOME/.bun/bin:/usr/local/bin:$PATH"
            echo "=== Deploying Crontech to Vultr ==="

            APP_DIR="/opt/crontech"
            cd "$APP_DIR"

            # Save current commit for rollback
            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "none")
            echo "Previous SHA: $PREV_SHA"

            # 1. Pull latest code
            echo "[1/8] Pulling latest code..."
            git fetch origin Main
            git reset --hard origin/Main

            # 2. Fix Caddy log ownership (prevents Caddy from crashing on log write)
            echo "[2/8] Fixing Caddy log ownership..."
            mkdir -p /var/log/caddy
            chown -R caddy:caddy /var/log/caddy

            # 3. Validate and repair .env file (strip malformed lines like =KEY=value)
            echo "[3/8] Validating env file..."
            if [ -f /opt/crontech/.env ]; then
              # Fix lines that start with = (corrupted env assignments)
              sed -i 's/^=\([A-Z_][A-Z0-9_]*\)=/\1=/' /opt/crontech/.env
              # Report any remaining malformed lines
              MALFORMED=$(grep -n '^[^A-Z#[:space:]]' /opt/crontech/.env | grep -v '^[0-9]*:#' || true)
              if [ -n "$MALFORMED" ]; then
                echo "WARNING: Potentially malformed .env lines:"
                echo "$MALFORMED"
              else
                echo "  .env looks clean"
              fi
            fi

            # 4. Install dependencies
            echo "[4/8] Installing dependencies..."
            bun install --frozen-lockfile

            # 5. Build
            echo "[5/8] Building..."
            bun run build

            # 5b. Run database migrations
            echo "[5b/8] Running database migrations..."
            bun run --cwd apps/api -e 'import("@back-to-the-future/db/migrate").then(m => m.runMigrations()).then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1) })' || echo "Migration skipped (DB not configured)"

            # 6. Sync service files from repo to systemd
            echo "[6/8] Syncing service files..."
            cp infra/bare-metal/crontech-web.service /etc/systemd/system/crontech-web.service
            cp infra/bare-metal/crontech-api.service /etc/systemd/system/crontech-api.service
            systemctl daemon-reload

            # 7. Restart services
            echo "[7/8] Restarting services..."
            systemctl restart crontech-api
            sleep 3
            systemctl restart crontech-web

            # 8. Health checks with rollback
            echo "[8/8] Verifying deploy..."
            DEPLOY_OK=false
            for i in $(seq 1 12); do
              sleep 5
              API=$(curl -sf http://localhost:3001/health 2>/dev/null | grep -o '"status":"ok"' || echo "fail")
              WEB=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
              echo "  Check $i/12: api=$API web=$WEB"
              if [ "$API" = '"status":"ok"' ] && [ "$WEB" = "200" ]; then
                DEPLOY_OK=true
                break
              fi
            done

            if [ "$DEPLOY_OK" = true ]; then
              echo ""
              echo "=== DEPLOY SUCCESS ==="
              echo "  Web: https://crontech.ai"
              echo "  API: https://api.crontech.ai"
              echo "  SHA: $(git rev-parse --short HEAD)"
            else
              echo ""
              echo "=== DEPLOY FAILED — ROLLING BACK ==="
              if [ "$PREV_SHA" != "none" ]; then
                git reset --hard "$PREV_SHA"
                bun install --frozen-lockfile
                bun run build
                systemctl restart crontech-api
                sleep 3
                systemctl restart crontech-web
                echo "Rolled back to $PREV_SHA"
              fi
              echo ""
              echo "--- crontech-api logs ---"
              journalctl -u crontech-api --no-pager -n 30
              echo ""
              echo "--- crontech-web logs ---"
              journalctl -u crontech-web --no-pager -n 30
              exit 1
            fi
