name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Pre-deploy checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy API worker
        run: bunx wrangler deploy --config infra/cloudflare/wrangler.toml

  deploy-edge-workers:
    name: Deploy Edge Workers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy D1 worker
        run: bunx wrangler deploy --name btf-d1-worker services/edge-workers/d1-worker.ts

      - name: Deploy KV worker
        run: bunx wrangler deploy --name btf-kv-worker services/edge-workers/kv-worker.ts

      - name: Deploy R2 worker
        run: bunx wrangler deploy --name btf-r2-worker services/edge-workers/r2-worker.ts
