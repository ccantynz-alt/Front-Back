name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome lint
        run: bunx biome check .

      - name: Type check
        run: bun run check

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Upload web build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.output/
          retention-days: 1

      - name: Upload edge-workers source
        uses: actions/upload-artifact@v4
        with:
          name: edge-workers
          path: |
            services/edge-workers/
            infra/cloudflare/wrangler.toml
          retention-days: 1

  deploy-api-dry-run:
    name: Deploy API (Dry Run)
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download edge-workers artifact
        uses: actions/download-artifact@v4
        with:
          name: edge-workers
          path: .

      - name: Dry-run deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: services/edge-workers
          command: deploy --env production --config ../../infra/cloudflare/wrangler.toml --dry-run

  deploy-api:
    name: Deploy API to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: deploy-api-dry-run
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download edge-workers artifact
        uses: actions/download-artifact@v4
        with:
          name: edge-workers
          path: .

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: services/edge-workers
          command: deploy --env production --config ../../infra/cloudflare/wrangler.toml

  deploy-web:
    name: Deploy Web to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build
        working-directory: apps/web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/.output/public --project-name=btf-web

  post-deploy-smoke:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      - name: Health check API
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.API_URL }}/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API health check passed"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying..."
            sleep 5
          done
          echo "API health check failed after 5 attempts"
          exit 1

      - name: Health check Web
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.WEB_URL }}" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Web health check passed"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying..."
            sleep 5
          done
          echo "Web health check failed after 5 attempts"
          exit 1
