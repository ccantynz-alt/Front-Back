name: Deploy

# ── Crontech Production Deploy (Vultr) ─────────────────────────────
# Pushes to main: build + test locally, then SSH into the Vultr box
# and pull/rebuild/restart. No Docker — runs Bun directly via systemd
# (Vultr has limited disk). Caddy handles TLS + reverse proxy.
#
# Required GitHub secrets:
#   VULTR_SERVER_IP    — production server IPv4 (45.76.21.235)
#   VULTR_SSH_KEY      — private SSH key for the deploy user
#
# Server layout (set up by scripts/setup-vultr.sh):
#   /opt/crontech/          — repo checkout
#   systemd: crontech-api   — Bun runs apps/api on port 3001
#   systemd: crontech-web   — Node runs apps/web/.output on port 3000
#   Caddy: crontech.ai      → localhost:3000
#   Caddy: api.crontech.ai  → localhost:3001

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build & Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate migrations
        run: bun run db:validate

      - name: Type check
        run: bun run check

      - name: Biome lint
        run: bunx biome check apps packages services

      - name: Link checker
        run: bun run check-links

      - name: Button checker
        run: bun run check-buttons

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test

  deploy-vultr:
    name: Deploy to Vultr
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VULTR_SERVER_IP }}
          username: root
          key: ${{ secrets.VULTR_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            export PATH="$HOME/.bun/bin:/usr/local/bin:$PATH"
            echo "=== Deploying Crontech to Vultr ==="

            APP_DIR="/opt/crontech"
            cd "$APP_DIR"

            # Save current commit for rollback
            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "none")
            echo "Previous SHA: $PREV_SHA"

            # 1. Pull latest code
            echo "[1/7] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # 2. Install dependencies
            echo "[2/7] Installing dependencies..."
            bun install --frozen-lockfile

            # 3. Build
            echo "[3/7] Building..."
            bun run build

            # 4. Run migrations
            echo "[4/7] Running migrations..."
            bun run --cwd apps/api -e 'import("@back-to-the-future/db/migrate").then(m => m.runMigrations()).then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1) })' || echo "Migration skipped (no DB configured yet)"

            # 5. Restart services
            echo "[5/7] Restarting services..."
            sudo systemctl restart crontech-api
            sleep 3
            sudo systemctl restart crontech-web

            # 6. Health checks with rollback
            echo "[6/7] Verifying deploy..."
            DEPLOY_OK=false
            for i in $(seq 1 12); do
              sleep 5
              API=$(curl -sf http://localhost:3001/api/health | grep -o '"status":"ok"' 2>/dev/null || echo "fail")
              WEB=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
              if [ "$API" = '"status":"ok"' ] && [ "$WEB" = "200" ]; then
                echo "Deploy verified — both services healthy"
                DEPLOY_OK=true
                break
              fi
              echo "  Check $i/12: api=$API web=$WEB"
            done

            if [ "$DEPLOY_OK" = true ]; then
              echo ""
              echo "=== DEPLOY SUCCESS ==="
              echo "  Web: https://crontech.ai"
              echo "  API: https://api.crontech.ai"
              echo "  SHA: $(git rev-parse --short HEAD)"
            else
              echo ""
              echo "=== DEPLOY FAILED — ROLLING BACK ==="
              if [ "$PREV_SHA" != "none" ]; then
                git reset --hard "$PREV_SHA"
                bun install --frozen-lockfile
                bun run build
                sudo systemctl restart crontech-api
                sleep 3
                sudo systemctl restart crontech-web
                echo "Rolled back to $PREV_SHA"
              fi
              echo ""
              echo "--- crontech-api logs ---"
              sudo journalctl -u crontech-api --no-pager -n 30
              echo ""
              echo "--- crontech-web logs ---"
              sudo journalctl -u crontech-web --no-pager -n 30
              exit 1
            fi
