name: Deploy

# ── Crontech Production Deploy ──────────────────────────────────────
# Pushes to main build + smoke-test the monorepo, then SSH into the
# Hetzner box and roll both crontech-web and crontech-api containers
# with the new commit SHA baked in. The deploy script on the box
# verifies /api/version reports the new SHA before reporting success,
# which is the actual cache-buster contract.
#
# Required GitHub secrets:
#   HETZNER_IP      — production server IPv4
#   DEPLOY_SSH_KEY  — private key for the 'deploy' user on the box
#   DEPLOY_SSH_KNOWN_HOSTS — output of `ssh-keyscan <HETZNER_IP>`
#                             (pin host key, reject on change)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # One deploy at a time for main. cancel-in-progress: false because
  # killing a mid-deploy SSH session can leave docker compose in a
  # half-rolled state on the box.
  group: deploy-main
  cancel-in-progress: false

jobs:
  build:
    name: Build + Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Quality gates are GATES. Per CLAUDE.md §0.4.1 rule 3, none of
      # these may be marked continue-on-error. If something goes red,
      # we fix the code — not silence the alarm.

      - name: Biome lint
        run: bunx biome check apps packages services

      - name: Type check
        run: bun run check

      - name: Link checker
        run: bun run check-links

      - name: Button checker
        run: bun run check-buttons

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build
    environment: production
    timeout-minutes: 20
    concurrency:
      # Serialize with any manual-triggered deploys for the same ref.
      group: hetzner-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        # Pinned action SHA would be stricter; appleboy/ssh-action@v1
        # matches the template in infra/hetzner/workflows/deploy.yml
        # and is already trusted for this repo's deploy path.
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Reject connection if host key changed (MITM protection).
          # Populate DEPLOY_SSH_KNOWN_HOSTS with `ssh-keyscan <ip>`.
          fingerprint: ${{ secrets.DEPLOY_SSH_FINGERPRINT }}
          script_stop: true
          command_timeout: 15m
          script: |
            /opt/crontech/scripts/crontech-deploy.sh \
              "${{ github.server_url }}/${{ github.repository }}.git" \
              "${{ github.sha }}" \
              "${{ github.ref_name }}"

  post-deploy-smoke:
    name: Post-Deploy Public Smoke
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 5
    steps:
      # The deploy script already verifies /api/version on the box.
      # This job re-verifies from outside Hetzner so we catch issues
      # the box can't see: DNS propagation, Caddy TLS, CDN caches.
      - name: Verify crontech.ai reports new SHA
        run: |
          set -euo pipefail
          TARGET="${{ github.sha }}"
          for url in "https://api.crontech.ai/api/version" "https://crontech.ai/api/version"; do
            echo "Probing $url for SHA $TARGET..."
            for attempt in 1 2 3 4 5 6; do
              body=$(curl -fsS --max-time 10 "$url" || echo '{}')
              reported=$(echo "$body" | grep -o '"sha":"[^"]*"' | head -n1 | cut -d'"' -f4 || echo '')
              if [ "$reported" = "$TARGET" ]; then
                echo "  OK  $url -> $reported"
                break
              fi
              echo "  ..  attempt $attempt reported='$reported'"
              if [ "$attempt" = "6" ]; then
                echo "FAIL: $url never reported $TARGET" >&2
                exit 1
              fi
              sleep 10
            done
          done
          echo "All public endpoints confirm $TARGET is live."
