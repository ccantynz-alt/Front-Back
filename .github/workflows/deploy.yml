name: Deploy

# ── Crontech Production Deploy (Vultr) ─────────────────────────────
# Pushes to main: build + test locally, then SSH into the Vultr box
# and pull/rebuild/restart. No Docker — runs Bun directly via systemd
# (Vultr has limited disk). Caddy handles TLS + reverse proxy.
#
# Required GitHub secrets:
#   VULTR_SERVER_IP    — production server IPv4 (45.76.21.235)
#   VULTR_SSH_KEY      — private SSH key for the deploy user
#
# Server layout (set up by scripts/setup-vultr.sh):
#   /opt/crontech/          — repo checkout
#   systemd: crontech-api   — Bun runs apps/api on port 3001
#   systemd: crontech-web   — Node runs apps/web/.output on port 3000
#   Caddy: crontech.ai      → localhost:3000
#   Caddy: api.crontech.ai  → localhost:3001

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build & Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Biome lint
        run: bunx biome check apps packages services

      - name: Link checker
        run: bun run check-links

      - name: Button checker
        run: bun run check-buttons

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test

  deploy-vultr:
    name: Deploy to Vultr
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VULTR_SERVER_IP }}
          username: deploy
          key: ${{ secrets.VULTR_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            export PATH="$HOME/.bun/bin:/usr/local/bin:$PATH"
            echo "=== Deploying Crontech to Vultr ==="

            APP_DIR="/opt/crontech"
            cd "$APP_DIR"

            # 1. Pull latest code
            echo "[1/6] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # 2. Install dependencies
            echo "[2/6] Installing dependencies..."
            bun install --frozen-lockfile

            # 3. Build
            echo "[3/6] Building..."
            bun run build

            # 4. Run migrations
            echo "[4/6] Running migrations..."
            bun run --cwd apps/api -e 'import("@back-to-the-future/db/migrate").then(m => m.runMigrations()).then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1) })' || echo "Migration skipped (no DB configured yet)"

            # 5. Restart services
            echo "[5/6] Restarting services..."
            sudo systemctl restart crontech-api
            sleep 3
            sudo systemctl restart crontech-web

            # 6. Health checks
            echo "[6/6] Running health checks..."
            sleep 5

            API_OK=false
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "API health check passed"
                API_OK=true
                break
              fi
              echo "  API attempt $i: status $STATUS, retrying..."
              sleep 3
            done

            WEB_OK=false
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Web health check passed"
                WEB_OK=true
                break
              fi
              echo "  Web attempt $i: status $STATUS, retrying..."
              sleep 3
            done

            if [ "$API_OK" = true ] && [ "$WEB_OK" = true ]; then
              echo ""
              echo "=== DEPLOY SUCCESS ==="
              echo "  Web: https://crontech.ai"
              echo "  API: https://api.crontech.ai"
            else
              echo ""
              echo "=== DEPLOY FAILED ==="
              echo "  API healthy: $API_OK"
              echo "  Web healthy: $WEB_OK"
              echo ""
              echo "--- crontech-api logs ---"
              sudo journalctl -u crontech-api --no-pager -n 30
              echo ""
              echo "--- crontech-web logs ---"
              sudo journalctl -u crontech-web --no-pager -n 30
              exit 1
            fi
