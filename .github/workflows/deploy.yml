name: Deploy

# ── Crontech Production Deploy (Cloudflare-native) ──────────────────
# BLK-020: Hetzner is dead. Crontech runs 100% on Cloudflare.
#
# What this workflow does:
#   1. On push to `main`, gate on check / test / build (preflight).
#   2. Deploy apps/api  -> Cloudflare Workers (via apps/api/wrangler.toml).
#   3. Deploy apps/web  -> Cloudflare Pages   (project: crontech-web,
#      dir:  apps/web/dist, config: apps/web/wrangler.toml).
#   4. Bake VITE_GIT_SHA=${GITHUB_SHA} into the web build so the in-app
#      Build Track HUD can detect deploy drift at runtime.
#
# Deploy tool choice:
#   We use cloudflare/wrangler-action@v3 for both deploys. It handles
#   credential plumbing (CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID)
#   automatically, pins a reproducible wrangler version, and keeps the
#   YAML short. Raw `npx wrangler` was the alternative — rejected because
#   we'd re-implement credential injection and per-step env boilerplate
#   four times. The action is cleaner.
#
# Required GitHub repo secrets (Craig must set these before first run):
#   CLOUDFLARE_API_TOKEN   — API token with permissions:
#                              - Account: Workers Scripts: Edit
#                              - Account: Cloudflare Pages: Edit
#                              - User: User Details: Read
#                              - Zone: Zone: Read (if using custom domain)
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID (dashboard → right sidebar)
#
# No other secrets. No SSH keys. No Hetzner IP. No docker compose.
# If this workflow ever regrows SSH, rsync, or anything referencing a
# long-lived server, that is a doctrine breach — see CLAUDE.md §0.7.
#
# Rollback to Hetzner:
#   Not supported. Hetzner infra is being torn down as part of BLK-020.
#   Rollback strategy going forward is "redeploy a prior commit to
#   Cloudflare" via `workflow_dispatch` pointing at an older SHA, which
#   Cloudflare Workers and Pages both support natively (Workers keeps
#   versions, Pages keeps deployments). If a red deploy lands, the fix
#   is: `git revert`, push, re-run this workflow.

on:
  push:
    # Default branch on this repo is `Main` (capital M), not `main`.
    # GitHub ref matching is case-sensitive, so we need the exact name
    # here or auto-deploy on merge never fires. Listing both is a
    # belt-and-braces in case the default is ever renamed to lowercase.
    branches: [Main, main]
  workflow_dispatch:

concurrency:
  # One deploy at a time for main. cancel-in-progress: false because a
  # mid-flight wrangler deploy that gets killed can leave Cloudflare
  # with a half-propagated worker version, which then requires manual
  # cleanup in the dashboard.
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build & Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Biome lint
        run: bunx biome check apps packages services

      - name: Link checker
        run: bun run check-links

      - name: Button checker
        run: bun run check-buttons

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test

  deploy-api:
    name: Deploy API → Cloudflare Workers
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build API
        # The api bundle is what wrangler ships. Build here explicitly
        # (rather than trusting the preflight artefact) so this job is
        # self-contained and can be re-run on its own via workflow_dispatch.
        run: bun run --filter=@back-to-the-future/api build

      - name: Deploy API to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy

  deploy-web:
    name: Deploy Web → Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Web (with git SHA baked in)
        # VITE_GIT_SHA is exposed as import.meta.env.VITE_GIT_SHA in the
        # client bundle. The Build Track HUD reads this and compares
        # against /api/version at runtime to detect cache / CDN drift.
        # Without this env var the HUD cannot tell if the user is on
        # a stale deploy, which is the whole point of the HUD.
        env:
          VITE_GIT_SHA: ${{ github.sha }}
        run: bun run --filter=@back-to-the-future/web build

      - name: Deploy Web to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy dist --project-name=crontech-web
