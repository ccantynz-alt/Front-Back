name: Deploy

# ── Crontech Production Deploy ──────────────────────────────────────
# Pushes to main build + smoke-test the monorepo, then SSH into the
# Hetzner box and roll both crontech-web and crontech-api containers
# with the new commit SHA baked in. The deploy script on the box
# verifies /api/version reports the new SHA before reporting success,
# which is the actual cache-buster contract.
#
# Required GitHub secrets:
#   HETZNER_IP      — production server IPv4
#   DEPLOY_SSH_KEY  — private key for the 'deploy' user on the box
#   DEPLOY_SSH_KNOWN_HOSTS — output of `ssh-keyscan <HETZNER_IP>`
#                             (pin host key, reject on change)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # One deploy at a time for main. cancel-in-progress: false because
  # killing a mid-deploy SSH session can leave docker compose in a
  # half-rolled state on the box.
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build & Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Biome lint
        run: bunx biome check apps packages services

      - name: Link checker
        run: bun run check-links

      - name: Button checker
        run: bun run check-buttons

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test

  deploy-hetzner:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            echo "=== Deploying Crontech to production ==="

            APP_DIR="/opt/crontech"
            cd "$APP_DIR"

            # 1. Pull latest code
            echo "[1/5] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # 2. Install dependencies
            echo "[2/5] Installing dependencies..."
            bun install --frozen-lockfile

            # 3. Rebuild Docker containers
            echo "[3/5] Rebuilding containers..."
            docker compose -f infra/hetzner/docker-compose.crontech.yml build --no-cache crontech-web crontech-api

            # 4. Rolling restart (API first, then web)
            echo "[4/5] Restarting services..."
            docker compose -f infra/hetzner/docker-compose.crontech.yml up -d crontech-api
            sleep 5
            docker compose -f infra/hetzner/docker-compose.crontech.yml up -d crontech-web

            # 5. Health checks
            echo "[5/5] Running health checks..."
            sleep 10

            API_OK=false
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "API health check passed"
                API_OK=true
                break
              fi
              echo "  API attempt $i: status $STATUS, retrying..."
              sleep 5
            done

            WEB_OK=false
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Web health check passed"
                WEB_OK=true
                break
              fi
              echo "  Web attempt $i: status $STATUS, retrying..."
              sleep 5
            done

            if [ "$API_OK" = true ] && [ "$WEB_OK" = true ]; then
              echo ""
              echo "=== DEPLOY SUCCESS ==="
              echo "  Web: https://crontech.ai"
              echo "  API: https://api.crontech.ai"
              docker compose -f infra/hetzner/docker-compose.crontech.yml ps
            else
              echo ""
              echo "=== DEPLOY FAILED ==="
              echo "  API healthy: $API_OK"
              echo "  Web healthy: $WEB_OK"
              echo ""
              echo "--- Container status ---"
              docker compose -f infra/hetzner/docker-compose.crontech.yml ps
              echo ""
              echo "--- Last 30 log lines ---"
              docker compose -f infra/hetzner/docker-compose.crontech.yml logs --tail 30
              exit 1
            fi
