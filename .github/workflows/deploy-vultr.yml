name: Deploy to Vultr VPS

# ── Crontech VPS Deploy (Vultr / Bun-native) ────────────────────────────
# Deploys Crontech to a Vultr VPS via SSH when code is pushed to main or
# any claude/* branch. This is a direct-on-metal deploy — no Docker, no
# Cloudflare. Bun runs both apps as systemd services behind Caddy.
#
# What this workflow does:
#   1. SSHs into the Vultr VPS (with retry + exponential backoff).
#   2. Pulls latest code from the pushed branch.
#   3. Installs dependencies with bun install.
#   4. Builds the web app (SERVER_PRESET=bun) and the API.
#   5. Runs database migrations.
#   6. Restarts the crontech-web and crontech-api systemd services.
#   7. Verifies both services are healthy.
#
# Required GitHub repo secrets (Craig must set these before first run):
#   VULTR_SSH_KEY    — private SSH key for connecting to the VPS
#   VULTR_SERVER_IP  — the VPS IP address (e.g. 45.76.21.235)
#
# First-time server setup:
#   Run scripts/setup-vultr.sh on the VPS before enabling this workflow.
#   It creates the crontech user, systemd services, and Caddy config.

on:
  push:
    branches:
      - main
      - Main
      - 'claude/*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # One deploy at a time per branch. Don't cancel in-progress — a killed
  # mid-deploy can leave the server in a half-built state.
  group: deploy-vultr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vultr VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.VULTR_SSH_KEY }}
          SERVER_IP: ${{ secrets.VULTR_SERVER_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "${SSH_KEY}" > ~/.ssh/vultr_key
          chmod 600 ~/.ssh/vultr_key
          # Accept the server's host key automatically on first connect.
          # StrictHostKeyChecking=accept-new is safer than =no — it only
          # accepts on first connection, then enforces from that point on.
          printf '%s\n' \
            "Host vultr" \
            "  HostName ${SERVER_IP}" \
            "  User root" \
            "  IdentityFile ~/.ssh/vultr_key" \
            "  StrictHostKeyChecking accept-new" \
            "  ConnectTimeout 15" \
            "  ServerAliveInterval 10" \
            "  ServerAliveCountMax 3" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Test SSH connection (with retry)
        id: ssh_test
        run: |
          MAX_RETRIES=4
          RETRY=0
          DELAY=5

          while [ $RETRY -lt $MAX_RETRIES ]; do
            echo "SSH connection attempt $(( RETRY + 1 )) of ${MAX_RETRIES}..."
            if ssh vultr "echo 'SSH connection successful'"; then
              echo "Connected."
              exit 0
            fi

            RETRY=$(( RETRY + 1 ))
            if [ $RETRY -lt $MAX_RETRIES ]; then
              echo "Connection failed. Retrying in ${DELAY}s..."
              sleep $DELAY
              DELAY=$(( DELAY * 2 ))
            fi
          done

          echo "::error::SSH connection failed after ${MAX_RETRIES} attempts"
          exit 1

      - name: Determine branch name
        id: branch
        run: |
          # GITHUB_REF is refs/heads/main or refs/heads/claude/foo
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "name=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Deploying branch: ${BRANCH}"

      - name: Pull latest code
        run: |
          ssh vultr << 'SCRIPT'
          set -euo pipefail
          cd /opt/Crontech

          # Fetch all branches and checkout the target branch
          git fetch origin --prune
          BRANCH="${{ steps.branch.outputs.name }}"

          CURRENT=$(git branch --show-current)
          if [ "$CURRENT" != "$BRANCH" ]; then
            echo "Switching from $CURRENT to $BRANCH..."
            git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH" "origin/$BRANCH"
          fi

          git reset --hard "origin/$BRANCH"
          echo "Now on $(git rev-parse --short HEAD) (${BRANCH})"
          SCRIPT

      - name: Install dependencies
        run: |
          ssh vultr << 'SCRIPT'
          set -euo pipefail
          cd /opt/Crontech
          echo "Installing dependencies..."
          bun install --frozen-lockfile || bun install
          echo "Dependencies installed."
          SCRIPT

      - name: Build web app
        run: |
          ssh vultr << 'SCRIPT'
          set -euo pipefail
          cd /opt/Crontech

          echo "Building web app (SERVER_PRESET=bun)..."
          cd apps/web
          SERVER_PRESET=bun bun run build
          echo "Web app built."
          SCRIPT

      - name: Build API
        run: |
          ssh vultr << 'SCRIPT'
          set -euo pipefail
          cd /opt/Crontech

          echo "Building API..."
          cd apps/api
          bun run build
          echo "API built."
          SCRIPT

      - name: Run database migrations
        run: |
          ssh vultr << 'SCRIPT'
          set -euo pipefail
          cd /opt/Crontech

          echo "Running database migrations..."
          bun run packages/db/src/migrate.ts 2>&1 || echo "Migration skipped (may already be current)"
          echo "Migrations complete."
          SCRIPT

      - name: Restart services
        run: |
          ssh vultr << 'SCRIPT'
          set -euo pipefail

          echo "Restarting Crontech services..."
          systemctl restart crontech-web
          systemctl restart crontech-api

          # Give services a moment to start
          sleep 3

          echo "Service status:"
          systemctl is-active crontech-web && echo "  crontech-web: running" || echo "  crontech-web: FAILED"
          systemctl is-active crontech-api && echo "  crontech-api: running" || echo "  crontech-api: FAILED"
          SCRIPT

      - name: Health check (with retry)
        run: |
          MAX_RETRIES=4
          RETRY=0
          DELAY=5

          while [ $RETRY -lt $MAX_RETRIES ]; do
            echo "Health check attempt $(( RETRY + 1 )) of ${MAX_RETRIES}..."

            WEB_OK=false
            API_OK=false

            # Check web app
            if ssh vultr "curl -sf --max-time 5 http://localhost:3000/ > /dev/null 2>&1"; then
              WEB_OK=true
              echo "  Web app: healthy"
            else
              echo "  Web app: not ready"
            fi

            # Check API
            if ssh vultr "curl -sf --max-time 5 http://localhost:4000/api/health > /dev/null 2>&1"; then
              API_OK=true
              echo "  API: healthy"
            else
              echo "  API: not ready"
            fi

            if [ "$WEB_OK" = true ] && [ "$API_OK" = true ]; then
              echo ""
              echo "All services healthy."
              exit 0
            fi

            RETRY=$(( RETRY + 1 ))
            if [ $RETRY -lt $MAX_RETRIES ]; then
              echo "Retrying in ${DELAY}s..."
              sleep $DELAY
              DELAY=$(( DELAY * 2 ))
            fi
          done

          echo "::warning::Health checks did not fully pass after ${MAX_RETRIES} attempts. Check server logs."
          # Don't fail the workflow — services may still be starting up.
          # The restart itself succeeded; health is best-effort verification.
          exit 0

      - name: Deploy summary
        if: always()
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          echo "## Vultr VPS Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${BRANCH}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Server** | \`${{ secrets.VULTR_SERVER_IP }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Web** | \`http://${{ secrets.VULTR_SERVER_IP }}:3000\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **API** | \`http://${{ secrets.VULTR_SERVER_IP }}:4000\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Services: \`crontech-web\` (port 3000), \`crontech-api\` (port 4000)" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/vultr_key
