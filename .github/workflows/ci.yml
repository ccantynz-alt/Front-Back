name: CI

on:
  push:
    branches: [main, Main, develop]
  pull_request:
    branches: [main, Main, develop]

# Workflow-wide baseline: read-only access. Individual jobs may expand
# scope explicitly if they need it. Anything that doesn't override stays
# least-privilege, matching GitHub hardening guidance.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome lint
        run: bunx biome check .

      - name: Type check all packages
        run: bun run check

      - name: Check links
        run: bun run check-links

      - name: Check buttons
        run: bun run check-buttons

      - name: Check zero-HTML doctrine (Wave 9 drift guard)
        run: bun run check-zero-html

      - name: Accessibility check
        run: bun run check-a11y

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-check
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Verify API bundle was created
        run: test -f apps/api/dist/index.js && echo "API build OK" || exit 1

      - name: Verify web build output exists
        run: test -d apps/web/.output && echo "Web build OK" || exit 1

      - name: Bundle size check
        run: bun run check-bundle

      - name: Performance budget summary
        if: always()
        run: |
          echo "## Performance Budgets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Budget | Enforcement |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Initial JS Bundle | < 50KB warn / < 100KB fail | bundle-size-check |" >> $GITHUB_STEP_SUMMARY
          echo "| FCP | < 1.0s | Lighthouse CI (planned) |" >> $GITHUB_STEP_SUMMARY
          echo "| LCP | < 1.5s | Lighthouse CI (planned) |" >> $GITHUB_STEP_SUMMARY
          echo "| INP | < 100ms | Lighthouse CI (planned) |" >> $GITHUB_STEP_SUMMARY

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run all tests
        run: bun run test

  # GateTest quality gate runs in a dedicated workflow (gatetest-gate.yml)
  # with proper permissions (pull-requests: write, security-events: write,
  # checks: write), SARIF upload, artifact archival, and diff-only mode
  # for PRs. It should NOT be duplicated here — see docs/BUILD_BIBLE.md
  # BLK-007 and CLAUDE.md §0.4.2.

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint-and-check, build, test]
    if: always()
    steps:
      - name: Report CI status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.lint-and-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quality Gates" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Command | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Biome Lint | \`bunx biome check .\` | ${{ needs.lint-and-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | \`bun run check\` | ${{ needs.lint-and-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Link Checker | \`bun run check-links\` | ${{ needs.lint-and-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Button Checker | \`bun run check-buttons\` | ${{ needs.lint-and-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Accessibility | \`bun run check-a11y\` | ${{ needs.lint-and-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | \`bun run build\` | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle Size | \`bun run check-bundle\` | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | \`bun run test\` | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
