# ── Crontech Platform — Self-Hosted Production Docker Compose ────────
# Fully self-sufficient. No Vercel. No Cloudflare Pages. Just Crontech
# running itself on a VPS.
#
# Architecture:
#   Internet -> Caddy (80/443) -> internal Docker network
#   crontech.ai       -> web:3000   (SolidStart SSR)
#   api.crontech.ai   -> api:3001   (Hono + Bun)
#   *.crontech.app    -> deployer:8080 (future, BLK-009)
#
# Only Caddy is exposed to the public internet. All other services
# communicate exclusively over an internal Docker network with no
# host port bindings.
#
# Usage:
#   # Core platform:
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d
#
#   # Core + observability (OTel, Grafana, Loki, Tempo, Mimir):
#   docker compose -f docker-compose.production.yml --env-file .env.production \
#     --profile observability up -d
#
#   # Rebuild after code change:
#   docker compose -f docker-compose.production.yml --env-file .env.production \
#     up -d --build web api orchestrator
#
#   # View logs:
#   docker compose -f docker-compose.production.yml logs -f
#
#   # Tear down (preserves volumes):
#   docker compose -f docker-compose.production.yml down
#
# Requires .env.production — see .env.production.example for the full
# variable list with documentation.

# ── Named Volumes ────────────────────────────────────────────────────

volumes:
  caddy-data:
    name: crontech-caddy-data
  caddy-config:
    name: crontech-caddy-config
  qdrant-data:
    name: crontech-qdrant-data
  api-data:
    name: crontech-api-data
  # Observability (created only when --profile observability is active)
  loki-data:
    name: crontech-loki-data
  tempo-data:
    name: crontech-tempo-data
  mimir-data:
    name: crontech-mimir-data
  grafana-data:
    name: crontech-grafana-data

# ── Networks ─────────────────────────────────────────────────────────

networks:
  # Public-facing: Caddy binds host ports here. Only Caddy joins this.
  crontech-public:
    name: crontech-public
    driver: bridge

  # Internal: all service-to-service traffic. No host port exposure.
  # The `internal: true` flag means Docker will NOT create iptables
  # rules that expose these containers to the host or internet.
  crontech-internal:
    name: crontech-internal
    driver: bridge
    internal: true

# ── Services ─────────────────────────────────────────────────────────

services:

  # ════════════════════════════════════════════════════════════════════
  # CADDY — Reverse Proxy + Automatic HTTPS via Let's Encrypt
  # The sole ingress point. HTTP/2 + HTTP/3 (QUIC).
  # ════════════════════════════════════════════════════════════════════

  caddy:
    image: caddy:2-alpine
    container_name: crontech-caddy
    restart: always
    ports:
      - "80:80"       # HTTP (redirects to HTTPS)
      - "443:443"     # HTTPS (HTTP/2)
      - "443:443/udp" # HTTP/3 (QUIC)
    environment:
      - ACME_EMAIL=${ACME_EMAIL:-admin@crontech.ai}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # TLS certs + ACME state
      - caddy-config:/config   # Caddy runtime config
    networks:
      - crontech-public
      - crontech-internal
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════
  # WEB — SolidStart SSR (Bun)
  # Internal only. Caddy fronts: crontech.ai -> web:3000
  # SERVER_PRESET=node-server (NOT cloudflare-pages).
  # ════════════════════════════════════════════════════════════════════

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        VITE_PUBLIC_API_URL: https://api.${CRONTECH_DOMAIN:-crontech.ai}
    container_name: crontech-web
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
      - SERVER_PRESET=node-server
      - GIT_SHA=${GIT_SHA:-unknown}
      - VITE_PUBLIC_API_URL=https://api.${CRONTECH_DOMAIN:-crontech.ai}
    networks:
      - crontech-internal
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      api:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════
  # API — Hono + Bun
  # Internal only. Caddy fronts: api.crontech.ai -> api:3001
  # Health check: /api/health
  # ════════════════════════════════════════════════════════════════════

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: crontech-api
    restart: always
    environment:
      # ── Core ──────────────────────────────────────────────
      - API_PORT=3001
      - NODE_ENV=production
      - GIT_SHA=${GIT_SHA:-unknown}
      - AUTO_MIGRATE=true
      - PUBLIC_URL=https://${CRONTECH_DOMAIN:-crontech.ai}
      - WEB_URL=https://${CRONTECH_DOMAIN:-crontech.ai}
      - API_URL=https://api.${CRONTECH_DOMAIN:-crontech.ai}
      - CORS_ORIGINS=https://${CRONTECH_DOMAIN:-crontech.ai},https://www.${CRONTECH_DOMAIN:-crontech.ai}
      - SITE_NAME=Crontech
      - EMAIL_FROM=${EMAIL_FROM:-noreply@crontech.ai}
      # ── Database ──────────────────────────────────────────
      - DATABASE_URL=${DATABASE_URL:-file:/data/crontech.db}
      - DATABASE_AUTH_TOKEN=${TURSO_AUTH_TOKEN:-}
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL:-}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN:-}
      - NEON_DATABASE_URL=${NEON_DATABASE_URL:-}
      # ── Vector DB ─────────────────────────────────────────
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      # ── Auth ──────────────────────────────────────────────
      - SESSION_SECRET=${SESSION_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - WEBAUTHN_RP_ID=${CRONTECH_DOMAIN:-crontech.ai}
      - WEBAUTHN_RP_NAME=Crontech
      - WEBAUTHN_ORIGIN=https://${CRONTECH_DOMAIN:-crontech.ai}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # ── AI ────────────────────────────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # ── Stripe ────────────────────────────────────────────
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      # ── Email ─────────────────────────────────────────────
      - ALECRAE_API_URL=${ALECRAE_API_URL:-}
      - ALECRAE_API_KEY=${ALECRAE_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      # ── Observability ─────────────────────────────────────
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_SERVICE_NAME=crontech-api
    volumes:
      - api-data:/data
    networks:
      - crontech-internal
    expose:
      - "3001"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      qdrant:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════
  # QDRANT — Vector Database (v1.12.5)
  # Internal only. API connects via qdrant:6333.
  # ════════════════════════════════════════════════════════════════════

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: crontech-qdrant
    restart: always
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    networks:
      - crontech-internal
    expose:
      - "6333"
      - "6334"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ════════════════════════════════════════════════════════════════════
  # ORCHESTRATOR — Internal Deploy Control Plane
  # Manages customer app deployments. Port 9000, internal only.
  # Depends on API for platform coordination.
  # ════════════════════════════════════════════════════════════════════

  orchestrator:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: crontech-orchestrator
    restart: always
    # Override the default CMD to run the orchestrator service instead
    command: ["bun", "run", "services/orchestrator/src/index.ts"]
    environment:
      - NODE_ENV=production
      - ORCHESTRATOR_PORT=9000
      - GIT_SHA=${GIT_SHA:-unknown}
    networks:
      - crontech-internal
    expose:
      - "9000"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      api:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════
  # OBSERVABILITY PROFILE
  # Activate with: --profile observability
  # Adds: OTel Collector, Loki, Tempo, Mimir, Grafana
  # ════════════════════════════════════════════════════════════════════

  # ── OpenTelemetry Collector ─────────────────────────────────────────
  # Single ingestion point for all telemetry. Forwards to Loki/Tempo/Mimir.

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: crontech-otel-collector
    restart: always
    profiles:
      - observability
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/lgtm/config/otel/config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - crontech-internal
    expose:
      - "4317"  # OTLP gRPC
      - "4318"  # OTLP HTTP
      - "8888"  # Collector self-metrics
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - loki
      - tempo
      - mimir

  # ── Loki — Log Aggregation ──────────────────────────────────────────

  loki:
    image: grafana/loki:3.2.0
    container_name: crontech-loki
    restart: always
    profiles:
      - observability
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/lgtm/config/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - crontech-internal
    expose:
      - "3100"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Tempo — Distributed Tracing ─────────────────────────────────────

  tempo:
    image: grafana/tempo:2.6.1
    container_name: crontech-tempo
    restart: always
    profiles:
      - observability
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./infra/lgtm/config/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - crontech-internal
    expose:
      - "3200"
      - "4317"
      - "4318"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Mimir — Metrics (Prometheus-compatible) ─────────────────────────

  mimir:
    image: grafana/mimir:2.14.2
    container_name: crontech-mimir
    restart: always
    profiles:
      - observability
    command: -config.file=/etc/mimir/config.yaml
    volumes:
      - ./infra/lgtm/config/mimir/mimir.yaml:/etc/mimir/config.yaml:ro
      - mimir-data:/data/mimir
    networks:
      - crontech-internal
    expose:
      - "9009"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Grafana — Unified Observability Dashboard ───────────────────────

  grafana:
    image: grafana/grafana:11.3.0
    container_name: crontech-grafana
    restart: always
    profiles:
      - observability
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change_me_now}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
      - GF_SERVER_ROOT_URL=https://grafana.${CRONTECH_DOMAIN:-crontech.ai}
      - GF_SERVER_HTTP_PORT=3200
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/lgtm/config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - crontech-internal
    expose:
      - "3200"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - loki
      - tempo
      - mimir
