# Crontech — pgbackrest configuration
#
# Installed by infra/bare-metal/scripts/pgbackrest-init.sh to
# /etc/pgbackrest/pgbackrest.conf. The S3-compatible repo points at the
# self-hosted MinIO instance documented in services/object-storage/.
#
# Secrets must be supplied via environment variables that pgbackrest
# expands at runtime (NEVER commit credentials):
#
#   PGBACKREST_REPO1_S3_KEY        — MinIO access key (= MINIO_ROOT_USER
#                                    or a dedicated "pgbackrest" service
#                                    user — preferred)
#   PGBACKREST_REPO1_S3_KEY_SECRET — MinIO secret
#   MINIO_ENDPOINT                 — e.g. minio.crontech.internal:9000
#                                    (the docker-compose currently binds
#                                    127.0.0.1:9000; expose via Caddy or
#                                    private network for off-host repo)
#
# pgbackrest expands ${VAR} from its own process environment, so the
# init script and the github-actions workflow set these before invoking
# any pgbackrest subcommand.
#
# Bucket layout (must exist before stanza-create):
#   crontech-backups/
#     ├── archive/crontech/...   (WAL segments, archive-push)
#     └── backup/crontech/...    (full + diff base backups)
#
# Audit ref: sub-track 8 ("backups are aspirational"). This stanza is
# the canonical backup target.

[global]
# Logging — script init creates /var/log/pgbackrest with mode 0750
# owned by postgres:postgres.
log-path=/var/log/pgbackrest
log-level-console=warn
log-level-file=detail

# Compress on the client to keep MinIO bandwidth + cost down. zstd is
# fastest at the same ratio as gzip-6.
compress-type=zst
compress-level=3

# Process limits — base backup runs in parallel; default 1 is too slow.
process-max=4

# ── Repository: MinIO over S3 protocol ────────────────────────────────
repo1-type=s3
repo1-s3-endpoint=${MINIO_ENDPOINT}
repo1-s3-bucket=crontech-backups
# MinIO ignores region but the S3 SDK requires it. us-east-1 is the
# conventional placeholder.
repo1-s3-region=us-east-1
# Path-style addressing is required for MinIO (it does not support
# virtual-hosted-style bucket DNS).
repo1-s3-uri-style=path
# HTTPS is recommended; set to `n` only for local 127.0.0.1 testing.
repo1-s3-verify-tls=y
repo1-storage-verify-tls=y

# Retention — keep 4 full backups (≈ 4 weeks if cadence is weekly) and
# 14 differentials in between. WAL is retained as long as the oldest
# full it descends from is alive.
repo1-retention-full=4
repo1-retention-diff=14

# ── Primary stanza ────────────────────────────────────────────────────
# Stanza name MUST match --stanza=crontech everywhere it appears
# (postgres-replica.conf archive_command, the workflow, the scripts).
[crontech]
pg1-path=/data/postgres/16/main
pg1-port=5432
pg1-user=postgres
# pgbackrest needs a dedicated DB role with REPLICATION + a few read
# privileges. The init script provisions it.
pg1-database=postgres
