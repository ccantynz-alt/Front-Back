# Crontech — Postgres 16 streaming replica configuration delta
#
# This file is NOT a standalone postgresql.conf. It is a set of overrides
# meant to be appended to the existing postgresql.conf on BOTH the primary
# (so it can act as a sender) and the replica (so it can run as hot
# standby). The base postgresql.conf is shipped by the postgresql-16 apt
# package and bootstrapped via scripts/bare-metal-setup.sh.
#
# How to apply (run on the primary first, then the replica):
#
#   sudo cat infra/bare-metal/postgres-replica.conf \
#        >> /etc/postgresql/16/main/postgresql.conf
#   sudo systemctl restart postgres
#
# After the primary restart, append the relevant line from
# infra/bare-metal/pg_hba.replica.conf to
# /etc/postgresql/16/main/pg_hba.conf, replacing <replica_ip> with the
# actual replica address, then `pg_reload_conf()` (or systemctl reload).
#
# To bootstrap the replica's data dir, run on the REPLICA:
#
#   sudo -u postgres pg_basebackup \
#        -h <primary_ip> -U replicator -D /data/postgres/16/main \
#        -X stream -P -R -W
#
# The -R flag writes standby.signal + primary_conninfo into the new data
# dir so the replica starts up in hot-standby mode automatically.
#
# Audit ref: sub-track 2 (single-box, no HA). This config is the
# prerequisite for promoting a second Vultr box to a warm standby.

# ── Write-Ahead Log ────────────────────────────────────────────────────
# `replica` is the minimum level that supports streaming replication and
# pg_basebackup. `logical` would also work but is heavier.
wal_level = replica

# How many concurrent replicas can stream from this primary. We size for
# 1 hot standby + headroom for ad-hoc pg_basebackup runs and pgbackrest
# stanza-creates. 10 is the conservative Postgres default upper bound.
max_wal_senders = 10

# Keep at least 1 GB of WAL on disk so a replica that briefly disconnects
# (network blip, restart) can resume streaming without a re-base. Tune up
# if the replica's WAN latency is high.
wal_keep_size = 1GB

# Allow read-only queries on the replica. Must be `on` for the replica to
# accept connections; harmless on the primary.
hot_standby = on

# ── Archiving (pgbackrest) ─────────────────────────────────────────────
# archive_mode must be set on the primary; archive_command is invoked
# every time a WAL segment is closed. pgbackrest archive-push is
# idempotent and durable — it pushes the segment to the MinIO repo
# defined in infra/bare-metal/pgbackrest.conf.
archive_mode = on
archive_command = 'pgbackrest --stanza=crontech archive-push %p'

# Optional but recommended: fail fast if the archive command keeps
# failing rather than silently filling pg_wal.
archive_timeout = 60
