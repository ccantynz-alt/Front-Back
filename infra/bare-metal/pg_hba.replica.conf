# Crontech — pg_hba.conf snippet for the streaming replica
#
# Append this line to /etc/postgresql/16/main/pg_hba.conf on the PRIMARY
# AFTER replacing <replica_ip> with the real address of the standby box
# (a single /32, not a CIDR — we want exactly one host). Then reload:
#
#   sudo -u postgres psql -c "SELECT pg_reload_conf();"
#
# Pre-req: a `replicator` role exists on the primary, e.g.
#
#   CREATE ROLE replicator WITH REPLICATION LOGIN PASSWORD '<pw>';
#
# scram-sha-256 matches the password_encryption setting documented in
# postgres-init.sql. Do NOT use `trust` or `md5` here.

host    replication    replicator    <replica_ip>/32    scram-sha-256
