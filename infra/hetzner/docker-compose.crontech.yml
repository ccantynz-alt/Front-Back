# Crontech Platform — Production Docker Compose (Phase 1)
# Just crontech.ai: web + api + postgres + redis
#
# Usage:
#   cd /opt/crontech
#   docker compose -f infra/hetzner/docker-compose.crontech.yml --env-file .env up -d
#   docker compose -f infra/hetzner/docker-compose.crontech.yml logs -f

services:
  # === Crontech Web (SolidStart SSR) ===
  crontech-web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        # GIT_SHA is baked into the client bundle + exposed via /api/version
        # for post-deploy smoke verification ("is the new build actually live?")
        GIT_SHA: ${GIT_SHA:-unknown}
        # Vite reads VITE_PUBLIC_API_URL at build time — runtime env would not
        # reach the client bundle. Baked in here so prod clients call the prod
        # API subdomain instead of localhost.
        VITE_PUBLIC_API_URL: https://api.${CRONTECH_DOMAIN:-crontech.ai}
    environment:
      - PORT=3000
      - NODE_ENV=production
      - GIT_SHA=${GIT_SHA:-unknown}
      - VITE_PUBLIC_API_URL=https://api.${CRONTECH_DOMAIN:-crontech.ai}
    networks:
      - crontech
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      crontech-api:
        condition: service_healthy

  # === Crontech API (Hono + Bun) ===
  crontech-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
      args:
        # GIT_SHA is exposed via /api/version so the deploy smoke test can
        # confirm the new build actually replaced the running container.
        GIT_SHA: ${GIT_SHA:-unknown}
    environment:
      - API_PORT=3001
      - NODE_ENV=production
      - GIT_SHA=${GIT_SHA:-unknown}
      - AUTO_MIGRATE=true
      - PUBLIC_URL=https://${CRONTECH_DOMAIN:-crontech.ai}
      - CORS_ORIGINS=https://${CRONTECH_DOMAIN:-crontech.ai},https://www.${CRONTECH_DOMAIN:-crontech.ai}
      - SITE_NAME=Crontech
      - EMAIL_FROM=noreply@crontech.ai
      # Database
      - DATABASE_URL=${DATABASE_URL}
      # Redis
      - REDIS_URL=redis://redis:6379
      # AI
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Qdrant
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      # Stripe
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      # Email (AlecRae MTA primary, Resend fallback)
      - ALECRAE_API_URL=${ALECRAE_API_URL:-}
      - ALECRAE_API_KEY=${ALECRAE_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      # Auth
      - SESSION_SECRET=${SESSION_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - WEBAUTHN_RP_ID=${CRONTECH_DOMAIN:-crontech.ai}
      - WEBAUTHN_RP_NAME=Crontech
      - WEBAUTHN_ORIGIN=https://${CRONTECH_DOMAIN:-crontech.ai}
      # Observability (optional)
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_SERVICE_NAME=crontech-api
    networks:
      - crontech
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # === PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=crontech
      - POSTGRES_USER=${POSTGRES_USER:-crontech}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - crontech
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crontech}"]
      interval: 10s
      timeout: 3s
      retries: 3

  # === Redis ===
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - crontech
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # === Qdrant (Vector DB) ===
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    networks:
      - crontech
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # === Caddy (Reverse Proxy + Auto-TLS) ===
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.crontech:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - CRONTECH_DOMAIN=${CRONTECH_DOMAIN:-crontech.ai}
    networks:
      - crontech
    restart: unless-stopped
    depends_on:
      crontech-web:
        condition: service_healthy
      crontech-api:
        condition: service_healthy

networks:
  crontech:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  caddy-data:
  caddy-config:
