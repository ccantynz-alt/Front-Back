# Crontech Platform — Production Docker Compose (Phase 1)
# Just crontech.ai: web + api + postgres + redis
#
# Usage:
#   cd /opt/crontech
#   docker compose -f infra/hetzner/docker-compose.crontech.yml --env-file .env up -d
#   docker compose -f infra/hetzner/docker-compose.crontech.yml logs -f

services:
  # === Crontech Web (SolidStart SSR) ===
  crontech-web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        # GIT_SHA is baked into the client bundle + exposed via /api/version
        # for post-deploy smoke verification ("is the new build actually live?")
        GIT_SHA: ${GIT_SHA:-unknown}
        # Vite reads VITE_PUBLIC_API_URL at build time — runtime env would not
        # reach the client bundle. Baked in here so prod clients call the prod
        # API subdomain instead of localhost.
        VITE_PUBLIC_API_URL: https://api.${CRONTECH_DOMAIN:-crontech.ai}
    # Bind to host loopback so system Caddy (installed by setup.sh) can
    # reverse-proxy without having to join the docker network. 127.0.0.1
    # prefix means the port isn't exposed to the public internet — only
    # Caddy on the same host can reach it.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - GIT_SHA=${GIT_SHA:-unknown}
      - VITE_PUBLIC_API_URL=https://api.${CRONTECH_DOMAIN:-crontech.ai}
    networks:
      - crontech
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      crontech-api:
        condition: service_healthy

  # === Crontech API (Hono + Bun) ===
  crontech-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
      args:
        # GIT_SHA is exposed via /api/version so the deploy smoke test can
        # confirm the new build actually replaced the running container.
        GIT_SHA: ${GIT_SHA:-unknown}
    # Host-loopback bind so system Caddy can proxy api.crontech.ai here.
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - API_PORT=3001
      - NODE_ENV=production
      - GIT_SHA=${GIT_SHA:-unknown}
      - AUTO_MIGRATE=true
      - PUBLIC_URL=https://${CRONTECH_DOMAIN:-crontech.ai}
      - CORS_ORIGINS=https://${CRONTECH_DOMAIN:-crontech.ai},https://www.${CRONTECH_DOMAIN:-crontech.ai}
      - SITE_NAME=Crontech
      - EMAIL_FROM=noreply@crontech.ai
      # Database
      - DATABASE_URL=${DATABASE_URL}
      # Redis
      - REDIS_URL=redis://redis:6379
      # AI
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Qdrant
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      # Stripe
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      # Email (AlecRae MTA primary, Resend fallback)
      - ALECRAE_API_URL=${ALECRAE_API_URL:-}
      - ALECRAE_API_KEY=${ALECRAE_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      # Auth
      - SESSION_SECRET=${SESSION_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - WEBAUTHN_RP_ID=${CRONTECH_DOMAIN:-crontech.ai}
      - WEBAUTHN_RP_NAME=Crontech
      - WEBAUTHN_ORIGIN=https://${CRONTECH_DOMAIN:-crontech.ai}
      # Observability (optional)
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_SERVICE_NAME=crontech-api
    networks:
      - crontech
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    # Only depend on redis — postgres is optional because the primary
    # DATABASE_URL typically points at an external managed Postgres
    # (Neon, Supabase, etc.). If .env has POSTGRES_PASSWORD set the
    # local postgres container still comes up alongside; if not, we
    # still deploy successfully.
    depends_on:
      redis:
        condition: service_healthy

  # === PostgreSQL (optional — only used if DATABASE_URL points here) ===
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=crontech
      - POSTGRES_USER=${POSTGRES_USER:-crontech}
      # Default keeps the container bootable when .env doesn't set the
      # variable (e.g. Craig uses Neon). The port is bound to 127.0.0.1
      # only, so the default is never reachable from outside the host.
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-crontech-local-dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - crontech
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crontech}"]
      interval: 10s
      timeout: 3s
      retries: 3

  # === Redis ===
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - crontech
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # === Qdrant (Vector DB) ===
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    networks:
      - crontech
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # NOTE: Caddy is NOT in this compose. The Hetzner box uses system Caddy
  # (installed by infra/hetzner/setup.sh). The deploy script writes
  # Caddyfile.crontech to /opt/crontech/Caddyfile and hot-swaps the
  # running Caddy via its admin API on localhost:2019 — no sudo required.
  # This also avoids a port 80/443 conflict with anything else bound to
  # the box's public interfaces.

networks:
  crontech:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
