# ── Cloudflare Workers Configuration ──────────────────────────────────
# API server deployed to Cloudflare Workers for sub-5ms cold starts
# across 330+ cities worldwide.
#
# FIRST DEPLOY NOTE: D1, KV, R2 bindings are commented out below.
# Once you create those resources in Cloudflare, paste the IDs back in
# and uncomment. The worker can boot WITHOUT them — it just won't have
# DB/cache/storage access until they're wired.

name = "crontech-api"
main = "../../services/edge-workers/src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

# ── Environment Variables ─────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
API_VERSION = "0.0.1"

# ── D1 Database (Edge SQLite) ─────────────────────────────────────────
# Uncomment after creating: wrangler d1 create crontech-production
# [[d1_databases]]
# binding = "DB"
# database_name = "crontech-production"
# database_id = "YOUR_D1_DATABASE_ID"

# ── R2 Object Storage (S3-compatible, zero egress) ────────────────────
# Uncomment after creating: wrangler r2 bucket create crontech-assets
# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "crontech-assets"

# ── KV Namespace (Global key-value) ──────────────────────────────────
# Uncomment after creating: wrangler kv:namespace create CACHE
# [[kv_namespaces]]
# binding = "CACHE"
# id = "YOUR_KV_NAMESPACE_ID"

# ── Durable Objects (Stateful edge compute) ───────────────────────────
[durable_objects]
bindings = [
  { name = "RATE_LIMITER", class_name = "RateLimiter" },
  { name = "COLLAB_ROOM", class_name = "CollabRoom" },
]

[[migrations]]
tag = "v1"
new_classes = ["CollabRoom", "RateLimiter"]

# ── AI (Workers AI for edge inference) ────────────────────────────────
[ai]
binding = "AI"

# ── Secrets (set via `wrangler secret put`) ───────────────────────────
# OPENAI_API_KEY
# DATABASE_AUTH_TOKEN
# QDRANT_API_KEY
# NEON_DATABASE_URL

# ── Development ───────────────────────────────────────────────────────
[dev]
port = 3002
local_protocol = "http"

# ── Staging Environment ──────────────────────────────────────────────
[env.staging]
name = "crontech-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

# ── Production Environment ────────────────────────────────────────────
[env.production]
name = "crontech-api-production"
[env.production.vars]
ENVIRONMENT = "production"

# ── Routes (crontech.ai) ─────────────────────────────────────────────
# Uncomment once crontech.ai is added as a Cloudflare zone (DNS)
# [[env.production.routes]]
# pattern = "api.crontech.ai/*"
# zone_name = "crontech.ai"
#
# [[env.production.routes]]
# pattern = "crontech.ai/*"
# zone_name = "crontech.ai"
