# Grafana LGTM observability stack
#
# Dev / single-box deployment. Brings up the full telemetry fabric:
#
#   OTel Collector ── logs ──▶ Loki   (otlphttp /otlp)
#                  ── traces ─▶ Tempo  (otlphttp :4318)
#                  ── metrics ▶ Mimir  (prometheusremotewrite /api/v1/push)
#   Grafana ─▶ Loki + Tempo + Mimir (auto-provisioned)
#
# Spin up:
#     docker compose -f infra/lgtm/docker-compose.yml up -d
#
# Point app OTel SDKs at:
#     OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
#
# Grafana: http://localhost:3000   (admin / admin by default)
# The Crontech Overview dashboard is pre-provisioned.
#
# All services bind to 127.0.0.1 only; production exposure goes
# through Caddy (TLS + auth). The box firewall (UFW) only allows
# 22/80/443 in from the outside.

services:
  loki:
    image: grafana/loki:3.2.0
    container_name: crontech-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./config/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/var/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - lgtm

  tempo:
    image: grafana/tempo:2.6.1
    container_name: crontech-tempo
    restart: unless-stopped
    ports:
      - "127.0.0.1:3200:3200"   # tempo http
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    command: -config.file=/etc/tempo.yaml
    networks:
      - lgtm

  mimir:
    image: grafana/mimir:2.14.2
    container_name: crontech-mimir
    restart: unless-stopped
    ports:
      - "127.0.0.1:9009:9009"
    volumes:
      - ./config/mimir/mimir.yaml:/etc/mimir/config.yaml:ro
      - mimir-data:/data/mimir
    command: -config.file=/etc/mimir/config.yaml
    networks:
      - lgtm

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    container_name: crontech-otel-collector
    restart: unless-stopped
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC (external apps)
      - "127.0.0.1:4318:4318"   # OTLP HTTP (external apps)
      - "127.0.0.1:8888:8888"   # collector self-telemetry
    volumes:
      - ./config/otel/config.yaml:/etc/otel-collector-config.yaml:ro
    command: ["--config=/etc/otel-collector-config.yaml"]
    depends_on:
      - loki
      - tempo
      - mimir
    networks:
      - lgtm

  grafana:
    image: grafana/grafana:11.3.0
    container_name: crontech-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
      - tempo
      - mimir
    networks:
      - lgtm

volumes:
  loki-data:
  tempo-data:
  mimir-data:
  grafana-data:

networks:
  lgtm:
    driver: bridge
