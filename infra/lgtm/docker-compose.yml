# Grafana LGTM observability stack
#
# Deployed to Hetzner box during Phase 0 bootstrap (step 12).
# Referenced by infra/bootstrap/phase-0.sh and CLAUDE.md §3 Observability.
#
# Components:
#   - Loki      -> logs
#   - Grafana   -> unified visualization
#   - Tempo     -> distributed traces (OpenTelemetry)
#   - Mimir     -> metrics (Prometheus-compatible)
#   - OTel Collector -> single entry point for all telemetry from
#                       substrate services, app runtimes, and AI agents
#
# Credentials: NEVER commit. Set in /etc/default/lgtm on the host,
# age-decrypted at service start by substrate/secrets/ at runtime.
#
# All services bind to 127.0.0.1 only. External access is via Caddy
# reverse proxy with TLS + auth. The box's firewall (UFW) only allows
# 22/80/443 from the outside world.

services:
  loki:
    image: grafana/loki:3.2.0
    container_name: crontech-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - lgtm

  tempo:
    image: grafana/tempo:2.6.1
    container_name: crontech-tempo
    restart: unless-stopped
    ports:
      - "127.0.0.1:3200:3200"   # tempo
      - "127.0.0.1:4317:4317"   # OTLP gRPC receiver
      - "127.0.0.1:4318:4318"   # OTLP HTTP receiver
    volumes:
      - ./tempo-config.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo
    command: -config.file=/etc/tempo.yml
    networks:
      - lgtm

  mimir:
    image: grafana/mimir:2.14.2
    container_name: crontech-mimir
    restart: unless-stopped
    ports:
      - "127.0.0.1:9009:9009"
    volumes:
      - ./mimir-config.yml:/etc/mimir/config.yml:ro
      - mimir-data:/var/mimir
    command: -config.file=/etc/mimir/config.yml
    networks:
      - lgtm

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    container_name: crontech-otel-collector
    restart: unless-stopped
    ports:
      - "127.0.0.1:4319:4317"   # OTLP gRPC (external apps)
      - "127.0.0.1:4320:4318"   # OTLP HTTP (external apps)
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    command: ["--config=/etc/otel-collector-config.yml"]
    depends_on:
      - loki
      - tempo
      - mimir
    networks:
      - lgtm

  grafana:
    image: grafana/grafana:11.3.0
    container_name: crontech-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set via age-decrypted env}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
      GF_SERVER_ROOT_URL: https://grafana.crontech.ai
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
      - tempo
      - mimir
    networks:
      - lgtm

volumes:
  loki-data:
  tempo-data:
  mimir-data:
  grafana-data:

networks:
  lgtm:
    driver: bridge

