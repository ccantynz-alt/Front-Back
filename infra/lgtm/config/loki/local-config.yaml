# ── Loki config (single-binary, filesystem backend) ─────────────────
# Dev stack settings. Filesystem storage, 7-day retention. When
# scaling past a single box, swap the object_store to S3/R2 and
# bump the replication factor.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /var/loki
  storage:
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 168h  # 7 days — dev stack

compactor:
  working_directory: /var/loki/compactor
  delete_request_store: filesystem
  retention_enabled: true
