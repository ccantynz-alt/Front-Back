name = "cronix-api"
main = "src/worker-entry.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# ── D1 Database ──────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "cronix-db"
database_id = "" # Set per environment

# ── R2 Object Storage ───────────────────────────────────────────
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "cronix-assets"

# ── KV Namespace ────────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "" # Set per environment

# ── Durable Objects — real-time collaboration rooms ─────────────
[durable_objects]
bindings = [
  { name = "COLLAB_ROOM", class_name = "CollabRoom" },
]

[[migrations]]
tag = "v1"
new_classes = ["CollabRoom"]

# ── Hyperdrive — connection pooling for Neon PostgreSQL ──────────
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "<your-hyperdrive-config-id>"

# ── Staging environment ─────────────────────────────────────────
[env.staging]
name = "cronix-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "cronix-db-staging"
database_id = ""

[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "cronix-assets-staging"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = ""

[env.staging.durable_objects]
bindings = [
  { name = "COLLAB_ROOM", class_name = "CollabRoom" },
]

# ── Production environment ──────────────────────────────────────
[env.production]
name = "cronix-api"
