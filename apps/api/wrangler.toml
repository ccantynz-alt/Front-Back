# ── API Server (Hono on Cloudflare Workers) ──────────────────────────
# The main API server deployed as a Cloudflare Worker.
# Wraps the Hono API with D1, R2, KV, Workers AI, and Durable Objects.
#
# Deploy: wrangler deploy
# Dev:    wrangler dev
#
# This worker uses the api-worker.ts entry point from edge-workers,
# which wraps the full Hono API for the Cloudflare Workers runtime.
#
# Secrets (set via `wrangler secret put <NAME>`):
#   OPENAI_API_KEY
#   DATABASE_AUTH_TOKEN
#   QDRANT_API_KEY
#   NEON_DATABASE_URL

name = "btf-api"
main = "../../services/edge-workers/api-worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

# ── Environment Variables ────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
API_VERSION = "0.1.0"

# ── D1 Database (Edge SQLite) ────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "btf-production"
database_id = "" # Run: wrangler d1 create btf-production

# ── R2 Object Storage (S3-compatible, zero egress fees) ──────────────
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "btf-assets"

# ── KV Namespace (Global key-value cache) ────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "" # Run: wrangler kv namespace create CACHE

# ── Durable Objects (Stateful edge compute) ──────────────────────────
[durable_objects]
bindings = [
  { name = "COLLAB_ROOM", class_name = "CollabRoom" },
  { name = "RATE_LIMITER", class_name = "RateLimiter" },
]

[[migrations]]
tag = "v1"
new_classes = ["CollabRoom", "RateLimiter"]

# ── Workers AI (Edge inference) ──────────────────────────────────────
[ai]
binding = "AI"

# ── Development ──────────────────────────────────────────────────────
[dev]
port = 3002
local_protocol = "http"

# ── Staging Environment ──────────────────────────────────────────────
[env.staging]
name = "btf-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
API_VERSION = "0.1.0"
[[env.staging.d1_databases]]
binding = "DB"
database_name = "btf-staging"
database_id = "" # Run: wrangler d1 create btf-staging
[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "btf-assets-staging"
[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "" # Run: wrangler kv namespace create CACHE --env staging

# ── Production Environment ───────────────────────────────────────────
[env.production]
name = "btf-api-production"
[env.production.vars]
ENVIRONMENT = "production"
API_VERSION = "0.1.0"
[[env.production.d1_databases]]
binding = "DB"
database_name = "btf-production"
database_id = "" # Run: wrangler d1 create btf-production
[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "btf-assets"
[[env.production.kv_namespaces]]
binding = "CACHE"
id = "" # Run: wrangler kv namespace create CACHE --env production
