name = "btf-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Uncomment and configure when ready:
# [[d1_databases]]
# binding = "DB"
# database_name = "btf-db"
# database_id = ""

# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "btf-storage"

# [[kv_namespaces]]
# binding = "CACHE"
# id = ""

# ── Hyperdrive — connection pooling for Neon PostgreSQL ──────────
# Eliminates cold-connect latency at the edge. Create with:
#   wrangler hyperdrive create btf-db --connection-string="postgresql://user:pass@host/db?sslmode=require"
# Then paste the returned ID below and uncomment.
#
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "<your-hyperdrive-config-id>"

[env.staging]
name = "btf-api-staging"

[env.production]
name = "btf-api"
