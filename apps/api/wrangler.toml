# =============================================================================
# STAGING ENVIRONMENT — `wrangler deploy --env staging`
# =============================================================================
[env.staging]
name = "crontech-api-staging"
workers_dev = true

[env.staging.vars]
NODE_ENV = "staging"
ENVIRONMENT = "staging"

[env.staging.triggers]
crons = ["*/1 * * * *"]

