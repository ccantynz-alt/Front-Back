name = "back-to-the-future-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Cron triggers — fire scheduled handlers on a schedule. The webhook
# dispatcher drains `webhook_deliveries` every minute.
[triggers]
crons = ["*/1 * * * *"]

# Uncomment and configure when ready to deploy:
# [[d1_databases]]
# binding = "DB"
# database_name = "back-to-the-future-db"
# database_id = "<your-database-id>"

# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "back-to-the-future-assets"

# [[kv_namespaces]]
# binding = "CACHE"
# id = "<your-kv-namespace-id>"

# Rate limiter store — shared across isolates so rate limiting survives
# cold starts (the in-memory Map implementation loses state on every spin-up,
# which effectively breaks rate limiting at Workers scale).
#
# Provisioning:
#   wrangler kv:namespace create RATE_LIMIT_KV
# Then copy the generated id below and uncomment.
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "<run `wrangler kv:namespace create RATE_LIMIT_KV` and paste the id>"
