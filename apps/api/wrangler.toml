name = "btf-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Uncomment and configure when ready:
# [[d1_databases]]
# binding = "DB"
# database_name = "btf-db"
# database_id = ""

# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "btf-storage"

# [[kv_namespaces]]
# binding = "CACHE"
# id = ""

[env.staging]
name = "btf-api-staging"

[env.production]
name = "btf-api"
