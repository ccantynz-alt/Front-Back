<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Primary background gradient - rich and deep -->
    <radialGradient id="bgRadial" cx="35%" cy="35%" r="65%" fx="35%" fy="35%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="40%" style="stop-color:#4F46E5"/>
      <stop offset="70%" style="stop-color:#5B21B6"/>
      <stop offset="100%" style="stop-color:#1E1B4B"/>
    </radialGradient>
    <!-- Overlay gradient for depth -->
    <linearGradient id="bgOverlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.15"/>
    </linearGradient>
    <!-- Glow gradient for the C endpoints -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#22D3EE;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:0"/>
    </radialGradient>
    <!-- Subtle inner shadow -->
    <radialGradient id="innerShadow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="80%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.3"/>
    </radialGradient>
    <!-- C lettermark gradient -->
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#E0E7FF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#C7D2FE;stop-opacity:0.9"/>
    </linearGradient>
    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#A78BFA;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:0.5"/>
    </linearGradient>
    <!-- Circuit line gradient -->
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:0.3"/>
    </linearGradient>
    <!-- Accent glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle with rich gradient -->
  <circle cx="256" cy="256" r="256" fill="url(#bgRadial)"/>
  <!-- Overlay for added depth -->
  <circle cx="256" cy="256" r="256" fill="url(#bgOverlay)"/>
  <!-- Inner shadow for 3D feel -->
  <circle cx="256" cy="256" r="256" fill="url(#innerShadow)"/>

  <!-- Subtle hex grid pattern in background -->
  <g opacity="0.06" stroke="#C7D2FE" stroke-width="1" fill="none">
    <line x1="128" y1="128" x2="180" y2="100"/>
    <line x1="180" y1="100" x2="256" y2="108"/>
    <line x1="256" y1="108" x2="320" y2="90"/>
    <line x1="320" y1="90" x2="370" y2="120"/>
    <line x1="128" y1="200" x2="175" y2="180"/>
    <line x1="175" y1="180" x2="256" y2="188"/>
    <line x1="256" y1="188" x2="340" y2="178"/>
    <line x1="128" y1="310" x2="180" y2="330"/>
    <line x1="180" y1="330" x2="256" y2="325"/>
    <line x1="256" y1="325" x2="340" y2="340"/>
    <line x1="340" y1="340" x2="390" y2="360"/>
    <line x1="128" y1="390" x2="180" y2="410"/>
    <line x1="180" y1="410" x2="256" y2="405"/>
    <line x1="256" y1="405" x2="330" y2="418"/>
    <!-- Vertical connections -->
    <line x1="180" y1="100" x2="175" y2="180"/>
    <line x1="256" y1="108" x2="256" y2="188"/>
    <line x1="340" y1="178" x2="340" y2="340"/>
    <line x1="180" y1="330" x2="180" y2="410"/>
    <line x1="256" y1="325" x2="256" y2="405"/>
  </g>
  <!-- Grid intersection dots -->
  <g opacity="0.08" fill="#C7D2FE">
    <circle cx="180" cy="100" r="3"/>
    <circle cx="256" cy="108" r="3"/>
    <circle cx="320" cy="90" r="3"/>
    <circle cx="175" cy="180" r="3"/>
    <circle cx="256" cy="188" r="3"/>
    <circle cx="340" cy="178" r="3"/>
    <circle cx="180" cy="330" r="3"/>
    <circle cx="256" cy="325" r="3"/>
    <circle cx="340" cy="340" r="3"/>
    <circle cx="180" cy="410" r="3"/>
    <circle cx="256" cy="405" r="3"/>
  </g>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#ringGrad)" stroke-width="1.5"/>
  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="url(#ringGrad)" stroke-width="0.8" opacity="0.4"/>

  <!-- The C lettermark - refined proportions -->
  <path d="M 310 155 A 125 125 0 1 0 310 357" fill="none" stroke="url(#cGrad)" stroke-width="38" stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- Glowing endpoints of the C -->
  <circle cx="310" cy="155" r="22" fill="url(#nodeGlow)" filter="url(#bigGlow)"/>
  <circle cx="310" cy="155" r="8" fill="#22D3EE"/>
  <circle cx="310" cy="155" r="4" fill="#FFFFFF"/>

  <circle cx="310" cy="357" r="22" fill="url(#nodeGlow)" filter="url(#bigGlow)"/>
  <circle cx="310" cy="357" r="8" fill="#22D3EE"/>
  <circle cx="310" cy="357" r="4" fill="#FFFFFF"/>

  <!-- Circuit extension lines from endpoints -->
  <g stroke="url(#circuitGrad)" stroke-width="2" stroke-linecap="round">
    <line x1="318" y1="148" x2="368" y2="118"/>
    <line x1="368" y1="118" x2="400" y2="120"/>
    <line x1="318" y1="364" x2="368" y2="394"/>
    <line x1="368" y1="394" x2="400" y2="392"/>
  </g>
  <!-- Circuit endpoint nodes -->
  <circle cx="368" cy="118" r="4" fill="#22D3EE" opacity="0.6"/>
  <circle cx="400" cy="120" r="3" fill="#22D3EE" opacity="0.35"/>
  <circle cx="368" cy="394" r="4" fill="#22D3EE" opacity="0.6"/>
  <circle cx="400" cy="392" r="3" fill="#22D3EE" opacity="0.35"/>

  <!-- Center AI core node -->
  <circle cx="185" cy="256" r="10" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="185" cy="256" r="5" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="185" cy="256" r="2.5" fill="#FFFFFF" opacity="0.6"/>

  <!-- Subtle orbital dots -->
  <circle cx="256" cy="36" r="2.5" fill="#818CF8" opacity="0.35"/>
  <circle cx="476" cy="256" r="2.5" fill="#22D3EE" opacity="0.35"/>
  <circle cx="256" cy="476" r="2.5" fill="#818CF8" opacity="0.35"/>
  <circle cx="36" cy="256" r="2.5" fill="#22D3EE" opacity="0.35"/>
</svg>
