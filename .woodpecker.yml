# ──────────────────────────────────────────────────────────────────────────────
# Crontech — CI Pipeline (Woodpecker CI on Gluecron)
# ──────────────────────────────────────────────────────────────────────────────
# Runs on every push (non-Main) and every pull_request. Deploy lives in
# `.woodpecker/deploy.yml` and fires only on pushes to Main.
#
# Compatibility: this file is driven by Woodpecker receiving webhooks from
# Gluecron. Gluecron emits GitHub-compatible webhook payloads (per
# docs/empire/gluecron-spec.md §Webhooks), so the `event` / `branch` filters
# below apply unchanged whether the source-of-truth is GitHub (transitional)
# or Gluecron (target state).
#
# Executes the quality gates from CLAUDE.md §0.4: lint, type check, tests,
# build. Plus the Crontech-specific gates (links, buttons, a11y, bundle).
#
# Agent runs with the local backend (no Docker) directly on the Vultr VPS
# as the `deploy` user. Bun, git, Docker, and the full system environment
# are available. All secrets come from Woodpecker secret references — NEVER
# hardcoded — see docs/runbooks/woodpecker-setup.md for the secret list.
# ──────────────────────────────────────────────────────────────────────────────

when:
  # Pull requests: always run the full gate suite.
  # Pushes to any branch except Main: run gates (deploy.yml handles Main).
  # Manual: allow re-running a commit from the Woodpecker UI for debugging.
  - event: pull_request
  - event: push
    branch:
      exclude: [Main, main]
  - event: manual

steps:
  # ── Install dependencies ─────────────────────────────────────────────────
  install:
    image: ""
    commands:
      - echo "=== Installing dependencies ==="
      - bun install --frozen-lockfile

  # ── Biome lint (fast, fails first) ───────────────────────────────────────
  lint:
    image: ""
    commands:
      - echo "=== Running Biome lint ==="
      - bunx biome check apps packages services
    depends_on:
      - install

  # ── Type check all packages ──────────────────────────────────────────────
  typecheck:
    image: ""
    commands:
      - echo "=== Type checking all packages ==="
      - bun run check
    depends_on:
      - install

  # ── Check links ──────────────────────────────────────────────────────────
  check-links:
    image: ""
    commands:
      - echo "=== Checking for dead links ==="
      - bun run check-links
    depends_on:
      - install

  # ── Check buttons ────────────────────────────────────────────────────────
  check-buttons:
    image: ""
    commands:
      - echo "=== Checking for dead buttons ==="
      - bun run check-buttons
    depends_on:
      - install

  # ── Accessibility check ──────────────────────────────────────────────────
  check-a11y:
    image: ""
    commands:
      - echo "=== Running accessibility checks ==="
      - bun run check-a11y
    depends_on:
      - install

  # ── Build all packages ──────────────────────────────────────────────────
  # SERVER_PRESET controls whether we build for the Vercel target or the
  # bare-metal self-host target. Default on CI is bare-metal because that
  # is how we deploy now (per docs/INFRASTRUCTURE.md INF-001/002).
  build:
    image: ""
    environment:
      SERVER_PRESET: "${SERVER_PRESET:-bare-metal}"
    commands:
      - echo "=== Building all packages (preset=$SERVER_PRESET) ==="
      - bun run build
      - echo "=== Verifying build artifacts ==="
      - test -f apps/api/dist/index.js && echo "API build OK" || exit 1
      - test -d apps/web/.output && echo "Web build OK" || exit 1
    depends_on:
      - typecheck
      - lint

  # ── Bundle size check ───────────────────────────────────────────────────
  check-bundle:
    image: ""
    commands:
      - echo "=== Checking bundle sizes ==="
      - bun run check-bundle
    depends_on:
      - build

  # ── Run all tests (unit + integration) ──────────────────────────────────
  test:
    image: ""
    commands:
      - echo "=== Running all tests (unit + integration) ==="
      - bun run test
    depends_on:
      - build

  # ── Final status ────────────────────────────────────────────────────────
  ci-status:
    image: ""
    commands:
      - echo ""
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo "  CI PASSED — All quality gates green"
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo ""
      - echo "  Lint:           PASS"
      - echo "  Type check:     PASS"
      - echo "  Links:          PASS"
      - echo "  Buttons:        PASS"
      - echo "  Accessibility:  PASS"
      - echo "  Build:          PASS"
      - echo "  Bundle size:    PASS"
      - echo "  Tests:          PASS"
      - echo ""
    depends_on:
      - test
      - check-links
      - check-buttons
      - check-a11y
      - check-bundle
