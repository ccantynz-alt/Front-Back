# ──────────────────────────────────────────────────────────────────────────────
# Crontech — Woodpecker environment reference
# ──────────────────────────────────────────────────────────────────────────────
# This file is NOT a pipeline. It is a declarative reference for the
# variables and secrets the other Woodpecker YAML files in this repo expect
# to find. Woodpecker doesn't natively include/merge YAML files across the
# .woodpecker directory, so everything here is documentation + a tripwire
# for future maintainers.
#
# To wire any of these values, register them in Woodpecker:
#
#   # Repo-scoped secret (preferred for anything repo-specific):
#   woodpecker-cli secret add --repository ccantynz-alt/Crontech \
#       --name VULTR_HOST --value "45.76.171.37"
#
#   # Org-scoped secret (shared across repos, e.g. SSH key used for all
#   # Crontech-family deploys):
#   woodpecker-cli secret add --organization ccantynz-alt \
#       --name VULTR_SSH_KEY --value "$(cat ~/.ssh/id_ed25519)"
#
# See docs/runbooks/woodpecker-setup.md for the full procedure.
# ──────────────────────────────────────────────────────────────────────────────

# ── Repo-level environment (plain, non-secret) ───────────────────────────
# Set via the Woodpecker UI: Repo → Settings → Environment.
# These are injected as env vars into every step.
environment:
  # Which build preset to use. Values: bare-metal (default) | vercel.
  # bare-metal is the current production target (INF-001/002).
  SERVER_PRESET: "bare-metal"

  # Deploy mode. Values: in-place (default) | ssh.
  # in-place: Woodpecker agent runs on the Vultr box, deploys via systemd.
  # ssh    : Woodpecker agent runs elsewhere, SSHes to VULTR_HOST and
  #           runs docker compose against docker-compose.production.yml.
  DEPLOY_MODE: "in-place"

  # Node/Bun build flags — overridable per-branch if needed.
  NODE_ENV: "production"

# ── Required secrets ──────────────────────────────────────────────────────
# Register via `woodpecker-cli secret add` (see runbook). Missing secrets
# cause the deploy step to hard-fail with a pointer to the runbook rather
# than silently producing a broken build.
secrets_required:
  # Runtime — written into /opt/crontech/.env on the target by deploy:
  - DATABASE_URL            # Turso or Neon connection string
  - TURSO_AUTH_TOKEN        # Turso JWT
  - ANTHROPIC_API_KEY       # Claude API
  - STRIPE_SECRET_KEY       # Billing
  - STRIPE_WEBHOOK_SECRET   # Billing webhooks
  - SESSION_SECRET          # Auth session signing
  - JWT_SECRET              # Auth JWT signing
  - GOOGLE_CLIENT_ID        # Google OAuth
  - GOOGLE_CLIENT_SECRET    # Google OAuth

# ── Optional secrets (feature-gated) ──────────────────────────────────────
secrets_optional:
  # Only required when DEPLOY_MODE=ssh:
  - VULTR_HOST              # IP or DNS of the target VPS
  - VULTR_SSH_KEY           # Private key, full multiline PEM
  - VULTR_SSH_USER          # Defaults to "deploy"

  # Observability — steps will no-op if unset:
  - OTEL_EXPORTER_OTLP_ENDPOINT
  - GRAFANA_API_KEY
  - SLACK_WEBHOOK_URL
  - DISCORD_WEBHOOK_URL
  - GITHUB_TOKEN            # Only needed while the repo mirror lives on GitHub
