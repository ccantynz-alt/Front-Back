# ──────────────────────────────────────────────────────────────────────────────
# Crontech — Deploy Pipeline (Woodpecker CI)
# ──────────────────────────────────────────────────────────────────────────────
# Replaces .github/workflows/deploy.yml. Triggered on push to main only.
#
# Since CI and the app run on the SAME Vultr VPS, deployment is direct:
# git pull, install, build, migrate, restart systemd services, health check.
# No SSH, no remote deploy, no artifact upload. Just restart in place.
#
# The agent runs as the 'deploy' user, which has sudo access to restart
# the crontech-api and crontech-web systemd services (configured in
# /etc/sudoers.d/crontech-deploy by setup-vultr.sh).
# ──────────────────────────────────────────────────────────────────────────────

when:
  - event: push
    branch: main

steps:
  # ── Pull latest code ────────────────────────────────────────────────────
  pull:
    image: ""
    commands:
      - echo "=== [1/7] Pulling latest code ==="
      - cd /opt/crontech
      - git fetch origin main
      - git reset --hard origin/main
      - echo "Checked out $(git rev-parse --short HEAD)"

  # ── Install dependencies ────────────────────────────────────────────────
  install:
    image: ""
    commands:
      - echo "=== [2/7] Installing dependencies ==="
      - cd /opt/crontech
      - bun install --frozen-lockfile
    depends_on:
      - pull

  # ── Quality gates ───────────────────────────────────────────────────────
  quality-gates:
    image: ""
    commands:
      - echo "=== [3/7] Running quality gates ==="
      - cd /opt/crontech
      - echo "--- Type check ---"
      - bun run check
      - echo "--- Biome lint ---"
      - bunx biome check apps packages services
      - echo "--- Link checker ---"
      - bun run check-links
      - echo "--- Button checker ---"
      - bun run check-buttons
      - echo "All quality gates passed"
    depends_on:
      - install

  # ── Build ───────────────────────────────────────────────────────────────
  build:
    image: ""
    commands:
      - echo "=== [4/7] Building all packages ==="
      - cd /opt/crontech
      - bun run build
      - test -f apps/api/dist/index.js && echo "API build OK" || exit 1
      - test -d apps/web/.output && echo "Web build OK" || exit 1
    depends_on:
      - quality-gates

  # ── Tests ───────────────────────────────────────────────────────────────
  test:
    image: ""
    commands:
      - echo "=== [5/7] Running tests ==="
      - cd /opt/crontech
      - bun run test
    depends_on:
      - build

  # ── Migrations ──────────────────────────────────────────────────────────
  migrate:
    image: ""
    commands:
      - echo "=== [6/7] Running database migrations ==="
      - cd /opt/crontech
      - |
        bun run --cwd apps/api -e '
          import("@back-to-the-future/db/migrate")
            .then(m => m.runMigrations())
            .then(() => process.exit(0))
            .catch(e => { console.error(e); process.exit(1) })
        ' || echo "Migration skipped (no DB configured yet)"
    depends_on:
      - test

  # ── Restart & Health Check ──────────────────────────────────────────────
  deploy:
    image: ""
    commands:
      - echo "=== [7/7] Restarting services and running health checks ==="
      - |
        # Restart API first, then web
        sudo systemctl restart crontech-api
        sleep 3
        sudo systemctl restart crontech-web
        sleep 5

        # Health check — API
        echo "--- API health check ---"
        API_OK=false
        for i in 1 2 3 4 5; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "API health check passed"
            API_OK=true
            break
          fi
          echo "  API attempt $i: status $STATUS, retrying..."
          sleep 3
        done

        # Health check — Web
        echo "--- Web health check ---"
        WEB_OK=false
        for i in 1 2 3 4 5; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Web health check passed"
            WEB_OK=true
            break
          fi
          echo "  Web attempt $i: status $STATUS, retrying..."
          sleep 3
        done

        # Final verdict
        if [ "$API_OK" = true ] && [ "$WEB_OK" = true ]; then
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DEPLOY SUCCESS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  Web: https://crontech.ai"
          echo "  API: https://api.crontech.ai"
          echo "  Git: https://git.crontech.ai"
          echo "  CI:  https://ci.crontech.ai"
          echo ""
        else
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DEPLOY FAILED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  API healthy: $API_OK"
          echo "  Web healthy: $WEB_OK"
          echo ""
          echo "--- crontech-api logs ---"
          sudo journalctl -u crontech-api --no-pager -n 30
          echo ""
          echo "--- crontech-web logs ---"
          sudo journalctl -u crontech-web --no-pager -n 30
          exit 1
        fi
    depends_on:
      - migrate
